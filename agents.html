<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Agents — Aasai Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

</head>
<body>

<div class="mobile-topbar">

  <span class="logo-text">Aasai Tech</span>
  <button class="mobile-menu-btn" id="mob-menu-btn"><span></span><span></span><span></span></button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark"><img src="logo.png" alt="" onerror="this.parentElement.outerHTML='<div class=\'logo-mark-fallback\'>A</div>'"/></div>
    <span class="logo-text">Aasai Tech</span>
  </div>
  <nav>
    <a class="nav-item" data-page="dashboard" href="home.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item active" data-page="agents" href="agents.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Agents</a>
    <a class="nav-item" data-page="conversations" href="conversations.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Conversations</a>
    <a class="nav-item" data-page="create" href="create-agent.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Create Agent</a>
    <a class="nav-item" data-page="settings" href="settings.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    <a class="nav-item" data-page="profile" href="profile.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-chip" onclick="location.href='profile.html'">
      <div class="user-avatar" id="user-avatar">?</div>
      <div style="flex:1;min-width:0;"><div class="user-name" id="user-name">…</div><div class="user-plan" id="user-plan">Free Plan</div></div>
      <button class="btn-logout" onclick="event.stopPropagation();logout()" title="Logout"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="page-title">My Agents</div>
    <a href="create-agent.html" class="btn-primary">+ New Agent</a>
  </div>
  <div class="content page-enter">
    <!-- Skeleton -->
    <div id="skel" class="agents-grid">
      <div class="agent-card" style="pointer-events:none;"><div class="skel" style="height:20px;margin-bottom:12px;"></div><div class="skel" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skel" style="height:14px;width:40%;"></div></div>
      <div class="agent-card" style="pointer-events:none;"><div class="skel" style="height:20px;margin-bottom:12px;"></div><div class="skel" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skel" style="height:14px;width:40%;"></div></div>
      <div class="agent-card" style="pointer-events:none;"><div class="skel" style="height:20px;margin-bottom:12px;"></div><div class="skel" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skel" style="height:14px;width:40%;"></div></div>
    </div>
    <div class="agents-grid" id="all-agents" style="display:none;"></div>
  </div>
</main>

<script src="_shared.js"></script>
<script>
async function init() {
  const user = await requireAuthPage()
  if (!user) return
  renderUserChip(user)
  initMobileSidebar()
  await loadAgents()
}

async function loadAgents() {
  try {
    const r = await apiFetch('/agents')
    const agents = await r.json()
    document.getElementById('skel').style.display = 'none'
    const grid = document.getElementById('all-agents')
    grid.style.display = 'grid'
    if (!agents.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🤖</div><h3>No agents yet</h3><p>Create your first AI agent to get started</p><a href="create-agent.html" class="btn-primary" style="display:inline-flex;">Create Agent</a></div>`
      return
    }
    grid.innerHTML = agents.map(a => {
      const logoHtml = a.logo_base64
        ? `<img src="${a.logo_base64}" style="width:100%;height:100%;object-fit:contain;" />`
        : a.logo_url ? `<img src="${a.logo_url}" />` : '🤖'
      return `<div class="agent-card" onclick="location.href='create-agent.html?id=${a._id}'">
        <div class="agent-card-header">
          <div class="agent-avatar" style="background:${a.brand_color||'#6c63ff'}22;">${logoHtml}</div>
          <div><div class="agent-name">${escHtml(a.name)}</div><div class="agent-desc">${a.sources_count||0} sources · ${(a.query_count||0).toLocaleString()} queries</div></div>
        </div>
        <div class="agent-footer">
          <span class="${a.published?'status-live':'status-draft'}">${a.published?'Live':'Draft'}</span>
          <div style="display:flex;gap:6px;">
            ${a.published_url?`<button class="btn-icon" onclick="event.stopPropagation();window.open('${a.published_url}','_blank')" title="Open"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>`:''}
            <button class="btn-icon" onclick="event.stopPropagation();deleteAgent('${a._id}',this)" title="Delete"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
          </div>
        </div>
      </div>`
    }).join('')
  } catch (e) { console.error(e) }
}

async function deleteAgent(id, btn) {
  if (!confirm('Delete this agent? This cannot be undone.')) return
  btnLoading(btn, '')
  await apiFetch('/agents/' + id, { method: 'DELETE' })
  toast('Agent deleted', 'success')
  loadAgents()
}

init()
</script>
</body>
</html>
