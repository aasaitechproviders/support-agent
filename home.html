<style>
  /* ── STORE CARDS ── */
  .stores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 18px; }
  .store-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: border-color .2s, transform .2s, box-shadow .2s;
  }
  .store-card:hover { border-color: rgba(108,99,255,0.35); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
  .store-banner {
    height: 76px;
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 12px;
  }
  .store-banner-logo { height: 48px; width: 48px; border-radius: 12px; object-fit: contain; background: rgba(255,255,255,0.15); padding: 4px; }
  .store-banner-initials { font-size: 26px; font-weight: 900; color: white; letter-spacing: -0.04em; }
  .store-card-body { padding: 16px 18px; }
  .store-name { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
  .store-slug { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .store-badges { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
  .store-kpis {
    display: grid; grid-template-columns: repeat(3,1fr);
    border-top: 1px solid var(--border);
    margin: 0 -18px 14px;
  }
  .store-kpi { padding: 10px 8px; text-align: center; border-right: 1px solid var(--border); }
  .store-kpi:last-child { border-right: none; }
  .store-kpi-val { font-size: 14px; font-weight: 800; font-family: 'DM Mono', monospace; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .store-kpi-val.loading { color: var(--border2); animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.3} }
  .store-kpi-val.rev { color: var(--green); }
  .store-kpi-val.today { color: var(--accent2); }
  .store-kpi-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .store-actions { display: flex; gap: 7px; flex-wrap: wrap; }

  /* ── DASH STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .stat-icon { font-size: 26px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 900; letter-spacing: -0.04em; font-family: 'DM Mono', monospace; }

  /* Card style picker */
  .card-style-picker { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 4px; }
  .card-style-opt { border: 2px solid var(--border); border-radius: 10px; padding: 10px 6px 8px; cursor: pointer; text-align: center; transition: all .15s; }
  .card-style-opt:hover, .card-style-opt.active { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .card-style-opt span { font-size: 11px; font-weight: 700; color: var(--text3); display: block; margin-top: 6px; }
  .card-style-opt.active span { color: var(--accent2); }
  .card-style-preview { height: 44px; display: flex; align-items: center; justify-content: center; }
  .cspr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; width: 40px; }
  .cspr-grid div { background: var(--border2); border-radius: 2px; height: 16px; }
  .card-style-opt.active .cspr-grid div { background: var(--accent); opacity: 0.5; }
  .cspr-list { display: flex; gap: 4px; align-items: center; width: 50px; margin-bottom: 3px; }
  .cspr-list-img { width: 16px; height: 16px; background: var(--border2); border-radius: 2px; flex-shrink: 0; }
  .cspr-list-lines { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .cspr-list-lines span { display: block; height: 3px; background: var(--border2); border-radius: 2px; }
  .card-style-opt.active .cspr-list-img, .card-style-opt.active .cspr-list-lines span { background: var(--accent); opacity: 0.5; }
  .cspr-minimal { position: relative; width: 40px; height: 40px; border-radius: 5px; overflow: hidden; }
  .cspr-min-img { position: absolute; inset: 0; background: var(--border2); }
  .cspr-min-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: rgba(0,0,0,0.3); }
  .card-style-opt.active .cspr-min-img { background: var(--accent); opacity: 0.4; }
  .cspr-magazine { display: flex; gap: 3px; width: 48px; height: 40px; }
  .cspr-mag-big { flex: 2; background: var(--border2); border-radius: 2px; }
  .cspr-mag-small { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .cspr-mag-small div { flex: 1; background: var(--border2); border-radius: 2px; }
  .card-style-opt.active .cspr-mag-big, .card-style-opt.active .cspr-mag-small div { background: var(--accent); opacity: 0.5; }
</style>

<script>
let currentUser = null, allStores = []

window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('stores')
  if (!nav) return
  currentUser = nav.user
  document.getElementById('storeEmail').value = currentUser.email || ''
  setTopbarActions(`<button class="btn btn-primary" onclick="openCreateStore()">+ New Store</button>`)
  await loadAll()
})

async function loadAll() {
  const pc = document.getElementById('page-content')
  // Remove stale stats row before re-rendering
  pc.querySelector('.stats-row')?.remove()
  await Promise.all([loadStores(), loadDashStats()])
}

async function loadStores() {
  allStores = await apiFetch('/stores')
  renderStores()
  allStores.forEach(s => loadStoreKPIs(s))
}

async function loadDashStats() {
  try {
    const d = await apiFetch('/dashboard')
    // Remove any existing stats row first
    document.getElementById('page-content')?.querySelector('.stats-row')?.remove()
    const statsHtml = `
      <div class="stats-row">
        <div class="stat-card"><span class="stat-icon">🏪</span><div><div class="stat-label">Total Stores</div><div class="stat-value">${d.stores_count}</div></div></div>
        <div class="stat-card"><span class="stat-icon">📦</span><div><div class="stat-label">Total Orders</div><div class="stat-value">${d.total_orders}</div></div></div>
        <div class="stat-card"><span class="stat-icon">🕐</span><div><div class="stat-label">Today\'s Orders</div><div class="stat-value">${d.today_orders}</div></div></div>
        <div class="stat-card"><span class="stat-icon">💰</span><div><div class="stat-label">Total Revenue</div><div class="stat-value">₹${(d.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div></div></div>
      </div>`
    document.getElementById('page-content').insertAdjacentHTML('afterbegin', statsHtml)
  } catch {}
}

async function loadStoreKPIs(s) {
  try {
    const data = await apiFetch(`/stores/${s._id}/analytics?days=30`)
    const cur = s.currency === 'USD' ? '$' : s.currency === 'EUR' ? '€' : '₹'
    const rev = data.total_revenue || 0
    const revStr = rev >= 100000 ? cur + (rev/100000).toFixed(1)+'L' : rev >= 1000 ? cur + (rev/1000).toFixed(1)+'k' : cur + rev.toFixed(0)
    const revEl = document.getElementById(`kpi-rev-${s._id}`)
    const ordEl = document.getElementById(`kpi-ord-${s._id}`)
    const todEl = document.getElementById(`kpi-today-${s._id}`)
    if (revEl) { revEl.textContent = revStr; revEl.classList.remove('loading'); revEl.classList.add('rev') }
    if (ordEl) { ordEl.textContent = data.total_orders || 0; ordEl.classList.remove('loading') }
    if (todEl) { todEl.textContent = data.today_orders || 0; todEl.classList.remove('loading'); todEl.classList.add('today') }
  } catch {}
}

function renderStores() {
  const container = document.getElementById('page-content')
  const existing = container.querySelector('.stores-grid')
  if (existing) existing.remove()

  if (!allStores.length) {
    container.insertAdjacentHTML('beforeend', `
      <div class="empty-state">
        <div class="empty-icon">🏪</div>
        <h3>No stores yet</h3>
        <p>Create your first store to start selling</p>
        <button class="btn btn-primary" style="margin-top:16px;" onclick="openCreateStore()">+ Create Store</button>
      </div>`)
    return
  }

  const grid = document.createElement('div')
  grid.className = 'stores-grid'
  grid.innerHTML = allStores.map(s => {
    const bg = s.brand_color || '#6c63ff'
    const logo = s.logo_url
      ? `<img class="store-banner-logo" src="${s.logo_url}" alt="">`
      : `<span class="store-banner-initials">${s.name.slice(0,2).toUpperCase()}</span>`
    return `<div class="store-card">
      <div class="store-banner" style="background:linear-gradient(135deg,${bg}ee,${bg}88);">${logo}</div>
      <div class="store-card-body">
        <div class="store-name">${s.name}</div>
        <div class="store-slug">/${s.slug}</div>
        <div class="store-badges">
          <span class="badge ${s.published ? 'badge-green' : 'badge-gray'}">${s.published ? '● Live' : '○ Draft'}</span>
          <span class="badge badge-gray">📦 ${s.product_count || 0}</span>
          <span class="badge badge-gray">📋 ${s.order_count || 0}</span>
        </div>
        <div class="store-kpis" style="padding: 0 18px;">
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-rev-${s._id}">—</div><div class="store-kpi-label">Revenue</div></div>
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-ord-${s._id}">—</div><div class="store-kpi-label">Orders</div></div>
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-today-${s._id}">—</div><div class="store-kpi-label">Today</div></div>
        </div>
        <div class="store-actions">
          ${s.published ? `<a href="${s.published_url}" target="_blank" class="btn btn-secondary btn-sm">🌐 View</a>` : ''}
          <button class="btn btn-secondary btn-sm" onclick="publishStore('${s._id}')">🚀 ${s.published ? 'Republish' : 'Publish'}</button>
          <button class="btn btn-secondary btn-sm" onclick="openEditStore('${s._id}')">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStore('${s._id}','${s.name.replace(/'/g,"\\'")}')">🗑</button>
        </div>
      </div>
    </div>`
  }).join('')
  container.appendChild(grid)
}

function openCreateStore() {
  document.getElementById('storeModalTitle').textContent = 'Create New Store'
  document.getElementById('storeEditId').value = ''
  document.getElementById('storeName').value = ''
  document.getElementById('storeTagline').value = ''
  document.getElementById('storeDesc').value = ''
  document.getElementById('storeEmail').value = currentUser?.email || ''
  document.getElementById('storePhone').value = ''
  document.getElementById('storeBrandColor').value = '#6c63ff'
  document.getElementById('storeLogoFile').value = ''
  document.getElementById('storeLogoExisting').value = ''
  document.getElementById('storeLogoPreview').style.display = 'none'
  selectCardStyle('grid', document.querySelector('[data-style="grid"]'))
  openModal('storeModal')
}

function openEditStore(id) {
  const s = allStores.find(x => x._id === id); if (!s) return
  document.getElementById('storeModalTitle').textContent = 'Edit Store'
  document.getElementById('storeEditId').value = id
  document.getElementById('storeName').value = s.name
  document.getElementById('storeTagline').value = s.tagline || ''
  document.getElementById('storeDesc').value = s.description || ''
  document.getElementById('storeEmail').value = s.contact_email || ''
  document.getElementById('storePhone').value = s.phone || ''
  document.getElementById('storeCurrency').value = s.currency || 'INR'
  document.getElementById('storeBrandColor').value = s.brand_color || '#6c63ff'
  const cs = s.card_style || 'grid'
  selectCardStyle(cs, document.querySelector(`[data-style="${cs}"]`))
  document.getElementById('storeLogoFile').value = ''
  document.getElementById('storeLogoExisting').value = s.logo_url || ''
  if (s.logo_url) {
    document.getElementById('storeLogoImg').src = s.logo_url
    document.getElementById('storeLogoPreview').style.display = 'block'
  } else document.getElementById('storeLogoPreview').style.display = 'none'
  openModal('storeModal')
}

async function saveStore() {
  const id = document.getElementById('storeEditId').value
  const name = document.getElementById('storeName').value.trim()
  if (!name) return toast('Store name is required', 'error')
  const fd = new FormData()
  fd.append('name', name)
  fd.append('tagline', document.getElementById('storeTagline').value.trim())
  fd.append('description', document.getElementById('storeDesc').value.trim())
  fd.append('contact_email', document.getElementById('storeEmail').value.trim())
  fd.append('phone', document.getElementById('storePhone').value.trim())
  fd.append('currency', document.getElementById('storeCurrency').value)
  fd.append('brand_color', document.getElementById('storeBrandColor').value)
  fd.append('card_style', document.getElementById('storeCardStyle').value || 'grid')
  const logoFile = document.getElementById('storeLogoFile').files[0]
  if (logoFile) fd.append('logo', logoFile)
  else fd.append('logo_url', document.getElementById('storeLogoExisting').value || '')
  try {
    const url = id ? `/stores/${id}` : '/stores'
    const res = await fetch(API + url, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: fd
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }
    closeModal('storeModal')
    await loadStores()
    toast(id ? 'Store updated!' : 'Store created!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function publishStore(id) {
  try {
    const r = await apiFetch(`/stores/${id}/publish`, { method: 'POST', body: '{}' })
    toast('Store published! URL copied.')
    navigator.clipboard.writeText(r.url).catch(() => {})
    await loadStores()
  } catch (e) { toast(e.message, 'error') }
}

async function deleteStore(id, name) {
  if (!confirm(`Delete "${name}" and all its data? This cannot be undone.`)) return
  try {
    await apiFetch(`/stores/${id}`, { method: 'DELETE', body: '{}' })
    await loadStores()
    toast('Store deleted')
  } catch (e) { toast(e.message, 'error') }
}

function selectCardStyle(style, el) {
  document.querySelectorAll('.card-style-opt').forEach(o => o.classList.remove('active'))
  if (el) el.classList.add('active')
  document.getElementById('storeCardStyle').value = style
}

function previewLogo(input) {
  if (!input.files[0]) return
  const r = new FileReader()
  r.onload = e => { document.getElementById('storeLogoImg').src = e.target.result; document.getElementById('storeLogoPreview').style.display = 'block' }
  r.readAsDataURL(input.files[0])
}
</script>
