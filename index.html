<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aasai — AI Agent Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #f0f0f8;
      --muted: #7a7a9a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb1 { width: 600px; height: 600px; background: rgba(108,99,255,0.14); top: -200px; left: -200px; }
    .orb2 { width: 400px; height: 400px; background: rgba(255,101,132,0.09); bottom: -100px; right: -100px; animation-delay: 3s; }
    .orb3 { width: 300px; height: 300px; background: rgba(67,233,123,0.06); top: 40%; left: 50%; animation-delay: 6s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
      line-height: 1.65;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-google:hover {
      background: #222234;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108,99,255,0.15);
    }
    .status-msg {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }
    .status-msg.error { color: #ff6584; }
    .features {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .feature-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent3);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="login-card">
    <div class="logo">
      <div class="logo-mark">A</div>
      <span class="logo-text">Aasai</span>
    </div>
    <h1>Build AI agents<br>in minutes</h1>
    <p class="subtitle">Turn your knowledge into a 24/7 conversational assistant. No code required.</p>

    <a href="https://apiv2.aasaitech.in/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>

    <div class="status-msg" id="statusMsg"></div>

    <div class="features">
      <div class="feature"><div class="feature-dot"></div> 1 million tokens free to start</div>
      <div class="feature"><div class="feature-dot"></div> Upload docs, text, URLs as knowledge</div>
      <div class="feature"><div class="feature-dot"></div> Publish a shareable chat link instantly</div>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);

      // If OAuth callback lands here with ?token=..., save and redirect
      const urlToken = params.get('token');
      if (urlToken) {
        localStorage.setItem('aasai_token', urlToken);
        window.history.replaceState({}, '', window.location.pathname);
        window.location.replace('home.html');
        return;
      }

      // Already logged in? Go to dashboard
      const existingToken = localStorage.getItem('aasai_token');
      if (existingToken) {
        window.location.replace('home.html');
        return;
      }

      // Show error if OAuth failed
      if (params.get('error')) {
        const msg = document.getElementById('statusMsg');
        msg.textContent = '⚠️ Login failed. Please try again.';
        msg.classList.add('error');
      }
    })();
  </script>
</body>
</html>
