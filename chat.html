<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* All colors driven by CSS variables — set dynamically via JS */
    :root {
      --accent: #6c63ff;
      --accent-rgb: 108, 99, 255;
      --accent-light: rgba(108,99,255,0.08);
      --bg: #f4f4fa;
      --surface: #ffffff;
      --surface2: #f0f0f8;
      --border: #e4e4f0;
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --muted: #8888aa;
      --radius: 18px;
      --shadow: 0 1px 8px rgba(0,0,0,0.05);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; transition:background 0.3s, color 0.3s; }

    /* ── HEADER ── */
    .chat-header {
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:12px 18px;
      display:flex; align-items:center; gap:12px;
      flex-shrink:0;
      box-shadow:var(--shadow);
    }
    .header-avatar {
      width:40px; height:40px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0; overflow:hidden;
      background:var(--accent-light);
    }
    .header-avatar img { width:100%; height:100%; object-fit:cover; }
    .header-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--text); }
    .header-status { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); margin-top:2px; }
    .status-dot { width:6px; height:6px; background:#43e97b; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .powered-by { margin-left:auto; font-size:11px; color:var(--muted); }
    .powered-by a { color:var(--accent); text-decoration:none; font-weight:500; }

    /* ── MESSAGES AREA ── */
    .messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ── WELCOME ── */
    .welcome-wrap { padding:20px 16px 0; display:flex; flex-direction:column; gap:16px; }
    .welcome-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px;
      display:flex; align-items:center; gap:14px;
    }
    .welcome-avatar {
      width:48px; height:48px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; flex-shrink:0; overflow:hidden;
      background:var(--accent-light);
    }
    .welcome-avatar img { width:100%; height:100%; object-fit:cover; border-radius:14px; }
    .welcome-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:4px; color:var(--text); }
    .welcome-msg { font-size:13px; color:var(--muted); line-height:1.5; }

    /* ── TOPICS ── */
    .topics-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
    .topics-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px; }
    .topics-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
    .topic-btn {
      display:flex; align-items:center; gap:10px;
      padding:11px 14px; border-radius:12px;
      border:1.5px solid var(--border); background:var(--bg);
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
      cursor:pointer; transition:all 0.18s; color:var(--text); text-align:left;
    }
    .topic-btn:hover {
      border-color:var(--accent);
      background:var(--accent-light);
      color:var(--accent);
      transform:translateY(-1px);
      box-shadow:0 4px 12px rgba(var(--accent-rgb),0.12);
    }
    .topic-icon-wrap {
      width:32px; height:32px; border-radius:8px;
      background:var(--surface); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0; transition:all 0.18s;
    }
    .topic-btn:hover .topic-icon-wrap { background:var(--accent); border-color:var(--accent); transform:scale(1.05); }
    .topic-text { flex:1; line-height:1.3; }
    .topics-loading { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; padding:4px 0; }
    .dots { display:flex; gap:4px; }
    .dot { width:5px; height:5px; background:var(--muted); border-radius:50%; animation:bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ── MESSAGES INNER ── */
    .msgs-inner { flex:1; padding:16px 16px 0; display:flex; flex-direction:column; gap:14px; }

    /* ── BUBBLES ── */
    .message { display:flex; gap:8px; animation:msgIn 0.25s ease; max-width:88%; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .message.user { align-self:flex-end; flex-direction:row-reverse; }
    .message.bot  { align-self:flex-start; }
    .msg-avatar { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px; overflow:hidden; background:var(--accent-light); }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-body { display:flex; flex-direction:column; gap:3px; }
    .msg-bubble { padding:12px 16px; border-radius:var(--radius); font-size:14px; line-height:1.6; }
    .message.user .msg-bubble { background:var(--accent); color:white; border-bottom-right-radius:5px; }
    .message.bot  .msg-bubble { background:var(--surface); color:var(--text); border:1px solid var(--border); border-bottom-left-radius:5px; box-shadow:var(--shadow); }
    .msg-time { font-size:10px; color:var(--muted); }
    .message.user .msg-time { text-align:right; }

    /* HTML in bot bubble */
    .msg-bubble h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin:0 0 8px; color:var(--text); }
    .msg-bubble h4 { font-size:14px; font-weight:600; margin:8px 0 4px; color:var(--text); }
    .msg-bubble p  { margin:4px 0; color:var(--text2); }
    .msg-bubble ul { padding-left:18px; margin:6px 0; }
    .msg-bubble li { margin:3px 0; font-size:13px; color:var(--text2); }
    .msg-bubble strong { font-weight:600; color:var(--text); }

    /* ── TYPING ── */
    .typing-wrap { display:flex; gap:8px; align-self:flex-start; animation:msgIn 0.2s ease; }
    .typing-bubble { padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:5px; display:flex; align-items:center; gap:5px; box-shadow:var(--shadow); }
    .typing-dot { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:bounce 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}

    /* ── INPUT ── */
    .chat-input-area { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px 16px; flex-shrink:0; }
    .input-row {
      display:flex; align-items:flex-end; gap:10px;
      background:var(--bg); border:1.5px solid var(--border);
      border-radius:16px; padding:8px 8px 8px 16px; transition:border-color 0.2s;
    }
    .input-row:focus-within { border-color:var(--accent); background:var(--surface); }
    #msg-input {
      flex:1; border:none; background:transparent;
      font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
      outline:none; resize:none; max-height:120px; line-height:1.55; padding:4px 0;
    }
    #msg-input::placeholder { color:var(--muted); }
    .btn-send { width:38px; height:38px; background:var(--accent); border:none; border-radius:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .btn-send:hover:not(:disabled) { opacity:0.88; transform:scale(1.05); }
    .btn-send:disabled { opacity:0.45; cursor:not-allowed; }
    .input-hint { font-size:11px; color:var(--muted); text-align:center; margin-top:8px; }

    /* ── LOADING / ERROR ── */
    #loading { display:flex; align-items:center; justify-content:center; height:100dvh; flex-direction:column; gap:12px; color:var(--muted); font-size:14px; }
    .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #error-screen { display:none; align-items:center; justify-content:center; height:100dvh; flex-direction:column; gap:12px; text-align:center; padding:20px; }
    #error-screen h2 { font-family:'Syne',sans-serif; }
    #error-screen p { color:var(--muted); font-size:14px; }

    /* ── DARK THEME overrides ── */
    body.theme-dark, body.theme-midnight, body.theme-slate, body.theme-forest {
      color-scheme: dark;
    }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Loading...</span></div>

<div id="error-screen">
  <div style="font-size:48px;">🤖</div>
  <h2>Agent not found</h2>
  <p>This agent may have been removed or the link is invalid.</p>
</div>

<div id="chat-ui" style="display:none; flex-direction:column; height:100dvh;">
  <div class="chat-header">
    <div class="header-avatar" id="h-avatar">🤖</div>
    <div>
      <div class="header-name" id="h-name">Loading...</div>
      <div class="header-status"><div class="status-dot"></div>Online</div>
    </div>
    <div class="powered-by">by <a href="https://aasaitech.in" target="_blank">Aasai</a></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome-wrap" id="welcome-wrap">
      <div class="welcome-card">
        <div class="welcome-avatar" id="w-avatar">🤖</div>
        <div>
          <div class="welcome-name" id="w-name">Hi there! 👋</div>
          <div class="welcome-msg" id="w-msg">How can I help you today?</div>
        </div>
      </div>
      <div class="topics-wrap" id="topics-wrap">
        <div class="topics-label">Explore Topics</div>
        <div class="topics-loading" id="topics-loading">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <span>Analysing knowledge base...</span>
        </div>
        <div class="topics-grid" id="topics-grid" style="display:none;"></div>
      </div>
    </div>
    <div class="msgs-inner" id="msgs-inner"></div>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Type your message..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="send()">
        <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Powered by Aasai AI · Responses may not always be accurate</div>
  </div>
</div>

<script>
  const API = 'https://apiv2.aasaitech.in'
  const agentId = new URLSearchParams(window.location.search).get('agent')
  let config = null
  let busy = false
  let conversationHistory = []

  // Theme definitions — must match home.html
  const THEMES = {
    light:    { bg:'#f4f4fa', surface:'#ffffff', surface2:'#f0f0f8', border:'#e4e4f0', text:'#1a1a2e', text2:'#4a4a6a', muted:'#8888aa', shadow:'0 1px 8px rgba(0,0,0,0.05)' },
    dark:     { bg:'#0a0a0f', surface:'#111118', surface2:'#1a1a24', border:'#2a2a38', text:'#f0f0f8', text2:'#c0c0d8', muted:'#7a7a9a', shadow:'0 1px 8px rgba(0,0,0,0.3)' },
    midnight: { bg:'#05050d', surface:'#0d0d1a', surface2:'#12122a', border:'#1e1e30', text:'#e8e8ff', text2:'#b8b8d8', muted:'#6868a0', shadow:'0 1px 8px rgba(0,0,0,0.4)' },
    slate:    { bg:'#0f172a', surface:'#1e293b', surface2:'#263044', border:'#334155', text:'#f1f5f9', text2:'#cbd5e1', muted:'#64748b', shadow:'0 1px 8px rgba(0,0,0,0.3)' },
    forest:   { bg:'#0a0f0a', surface:'#111811', surface2:'#182218', border:'#1e2e1e', text:'#f0f8f0', text2:'#c0d8c0', muted:'#6a8a6a', shadow:'0 1px 8px rgba(0,0,0,0.3)' },
  }

  const TOPIC_ICONS = {
    fee:'💰',fees:'💰',price:'💰',cost:'💰',payment:'💰',charges:'💰',
    admission:'📋',admissions:'📋',enroll:'📋',registration:'📋',apply:'📋',
    timing:'⏰',timings:'⏰',time:'⏰',hours:'⏰',schedule:'⏰',
    transport:'🚌',bus:'🚌',route:'🚌',
    facility:'🏫',facilities:'🏫',infrastructure:'🏫',lab:'🔬',library:'📖',
    contact:'📞',phone:'📞',email:'📧',address:'📍',location:'📍',
    class:'📚',classes:'📚',course:'📚',subject:'📚',curriculum:'📚',
    result:'🏆',results:'🏆',achievement:'🏆',score:'🏆',rank:'🏆',
    staff:'👩‍🏫',teacher:'👩‍🏫',faculty:'👩‍🏫',principal:'👩‍🏫',
    sport:'⚽',sports:'⚽',activity:'🎨',club:'🎭',
    hostel:'🏠',accommodation:'🏠',scholarship:'🎓',discount:'🎓',
    exam:'📝',test:'📝',assessment:'📝',about:'ℹ️',overview:'ℹ️',
    health:'🏥',medical:'🏥',food:'🍽️',cafeteria:'🍽️',canteen:'🍽️',
    online:'💻',digital:'💻',app:'📱',website:'🌐',
    event:'🎉',fest:'🎉',security:'🔒',music:'🎵',dance:'💃',art:'🎨',
  }

  function getIcon(topic) {
    const lower = topic.toLowerCase()
    for (const [key, icon] of Object.entries(TOPIC_ICONS)) if (lower.includes(key)) return icon
    return '💡'
  }

  function hexToRgb(hex) {
    try {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
      return `${r}, ${g}, ${b}`
    } catch(e) { return '108, 99, 255' }
  }

  // ── INIT ──
  async function init() {
    if (!agentId) { showError(); return }
    try {
      const r = await fetch(`${API}/chat/${agentId}/config`)
      if (!r.ok) { showError(); return }
      config = await r.json()
      applyBranding()
      document.getElementById('loading').style.display = 'none'
      const ui = document.getElementById('chat-ui')
      ui.style.display = 'flex'
      ui.style.flexDirection = 'column'
      extractTopics()
    } catch(e) { showError() }
  }

  // ── BRANDING — the core fix ──
  function applyBranding() {
    const accentHex = config.brand_color || '#6c63ff'
    const themeId = config.theme || 'light'
    const theme = THEMES[themeId] || THEMES.light

    // Set CSS variables on :root
    const root = document.documentElement.style
    root.setProperty('--accent', accentHex)
    root.setProperty('--accent-rgb', hexToRgb(accentHex))
    root.setProperty('--accent-light', `rgba(${hexToRgb(accentHex)}, 0.10)`)
    root.setProperty('--bg', theme.bg)
    root.setProperty('--surface', theme.surface)
    root.setProperty('--surface2', theme.surface2)
    root.setProperty('--border', theme.border)
    root.setProperty('--text', theme.text)
    root.setProperty('--text2', theme.text2)
    root.setProperty('--muted', theme.muted)
    root.setProperty('--shadow', theme.shadow)

    // Apply theme class to body
    document.body.className = `theme-${themeId}`

    document.title = config.name || 'Chat'
    const logo = config.logo_url ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />` : '🤖'

    document.getElementById('h-name').textContent = config.name || 'Assistant'
    document.getElementById('h-avatar').innerHTML = logo
    document.getElementById('w-avatar').innerHTML = logo
    document.getElementById('w-name').textContent = 'Hi there! 👋'
    document.getElementById('w-msg').textContent = config.welcome_message || 'How can I help you today?'
  }

  // ── TOPIC EXTRACTION ──
  async function extractTopics() {
    try {
      const r = await fetch(`${API}/chat/${agentId}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question:'List the main topics covered in your knowledge base as a simple comma-separated list. Only topic names, no descriptions, no numbering, maximum 8 topics.', history:[], _internal:true })
      })
      const d = await r.json()
      const raw = (d.answer||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()
      let topics = raw.split(/[,\n•\-\*\|]/).map(t=>t.replace(/^\d+\.\s*/,'').trim()).filter(t=>t.length>2&&t.length<45).slice(0,8)
      if (!topics.length) topics = (config.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean)
      renderTopics(topics)
    } catch(e) { renderTopics((config.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean)) }
  }

  function renderTopics(topics) {
    const grid = document.getElementById('topics-grid')
    const loading = document.getElementById('topics-loading')
    if (!topics.length) { document.getElementById('topics-wrap').style.display='none'; return }
    grid.innerHTML = topics.map(topic => `
      <button class="topic-btn" onclick="sendText('Tell me about ${topic.replace(/'/g,"\\'")}')">
        <div class="topic-icon-wrap"><span>${getIcon(topic)}</span></div>
        <span class="topic-text">${topic}</span>
      </button>`).join('')
    loading.style.display = 'none'
    grid.style.display = 'grid'
  }

  // ── CHAT ──
  function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px' }
  function sendText(t) { document.getElementById('msg-input').value=t; send() }

  async function send() {
    const input = document.getElementById('msg-input')
    const text = input.value.trim()
    if (!text || busy) return
    const ww = document.getElementById('welcome-wrap')
    if (ww) { ww.style.transition='opacity 0.2s'; ww.style.opacity='0'; setTimeout(()=>ww.remove(),200) }
    addMsg('user', text)
    input.value=''; input.style.height='auto'
    busy = true
    document.getElementById('send-btn').disabled = true
    const typing = showTyping()
    try {
      const r = await fetch(`${API}/chat/${agentId}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question:text, history:conversationHistory, session_id, visitor_id })
      })
      const d = await r.json()
      typing.remove()
      const answer = d.answer || '<p>Sorry, I could not find an answer to that.</p>'
      addMsg('bot', answer)
      conversationHistory.push({role:'user',content:text})
      conversationHistory.push({role:'assistant',content:answer})
      if (conversationHistory.length>20) conversationHistory = conversationHistory.slice(-20)
    } catch(e) { typing.remove(); addMsg('bot','<p>Sorry, I\'m having trouble connecting. Please try again.</p>') }
    busy = false
    document.getElementById('send-btn').disabled = false
    document.getElementById('msg-input').focus()
  }

  function addMsg(role, content) {
    const container = document.getElementById('msgs-inner')
    const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    const logo = config?.logo_url ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />` : '🤖'
    const el = document.createElement('div')
    el.className = `message ${role}`
    if (role==='user') {
      el.innerHTML = `<div class="msg-avatar">${logo}</div><div class="msg-body"><div class="msg-bubble">${escapeUser(content)}</div><div class="msg-time">${time}</div></div>`
    } else {
      el.innerHTML = `<div class="msg-avatar">${logo}</div><div class="msg-body"><div class="msg-bubble">${content}</div><div class="msg-time">${time}</div></div>`
    }
    container.appendChild(el)
    document.getElementById('messages').scrollTop = 999999
  }

  function showTyping() {
    const container = document.getElementById('msgs-inner')
    const logo = config?.logo_url ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />` : '🤖'
    const el = document.createElement('div')
    el.className = 'typing-wrap'
    el.innerHTML = `<div class="msg-avatar">${logo}</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`
    container.appendChild(el)
    document.getElementById('messages').scrollTop = 999999
    return el
  }

  function escapeUser(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') }
  function showError() { document.getElementById('loading').style.display='none'; document.getElementById('error-screen').style.display='flex' }

  init()
</script>
</body>
</html>
