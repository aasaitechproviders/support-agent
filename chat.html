<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --bg:       #f5f4f0;
      --surface:  #ffffff;
      --surface2: #f0eeeb;
      --border:   rgba(0,0,0,0.08);
      --border2:  rgba(0,0,0,0.13);
      --text:     #1a1917;
      --text2:    #6b6860;
      --text3:    #a09e99;
      --accent:   #2c5f8a;
      --accent-l: #e8f0f8;
      --accent-b: rgba(44,95,138,0.25);
      --accent-rgb: 44,95,138;
      --green:    #1d7a5f;
      --red:      #c0392b;
      --font:     'Plus Jakarta Sans', sans-serif;
      --mono:     'JetBrains Mono', monospace;
      --shadow:   0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
      --safe-b:   env(safe-area-inset-bottom, 0px);
      --safe-t:   env(safe-area-inset-top, 0px);
      --col:      720px;
      --pad:      20px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--pad);
      padding-top: var(--safe-t);
      height: calc(58px + var(--safe-t));
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; z-index: 10;
      box-shadow: 0 1px 0 var(--border), 0 2px 12px rgba(0,0,0,0.03);
    }
    .hdr-logo {
      width: 40px; height: 40px; border-radius: 11px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.32);
    }
    .hdr-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 11px; }
    .hdr-fb { font-size: 16px; color: white; font-weight: 800; }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name {
      font-size: 14px; font-weight: 800; letter-spacing: -0.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hdr-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 10.5px; color: var(--text3); margin-top: 2px;
      font-family: var(--mono);
    }
    .sdot {
      width: 6px; height: 6px; background: var(--green);
      border-radius: 50%; flex-shrink: 0;
      animation: pulse 2.4s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
    .hdr-by {
      margin-left: auto; font-size: 10px; color: var(--text3);
      font-family: var(--mono); white-space: nowrap; flex-shrink: 0;
    }
    .hdr-by a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .hdr-by a:hover { text-decoration: underline; }

    /* ═══════════════════════════════════════════
       SCROLL + COLUMN
       One column width rules everything — zero
       layout shift from welcome → conversation
    ═══════════════════════════════════════════ */
    .scroll {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      background: linear-gradient(160deg, #f5f4f0 0%, #edf1f7 55%, #f0eeeb 100%);
    }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Single centered column — welcome + messages share this */
    .col {
      width: 100%;
      max-width: var(--col);
      margin: 0 auto;
      padding-left: var(--pad);
      padding-right: var(--pad);
    }

    /* ═══════════════════════════════════════════
       WELCOME
    ═══════════════════════════════════════════ */
    .welcome {
      padding-top: 28px; padding-bottom: 20px;
      display: flex; flex-direction: column; gap: 14px;
      animation: fadeUp .32s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .w-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 20px; padding: 20px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow);
    }
    .w-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 3px 14px rgba(var(--accent-rgb), 0.28);
    }
    .w-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 14px; }
    .w-logo-fb { font-size: 21px; color: white; font-weight: 800; }
    .w-name { font-size: 16px; font-weight: 800; letter-spacing: -0.022em; margin-bottom: 4px; }
    .w-sub  { font-size: 13px; color: var(--text2); line-height: 1.6; }

    .topics-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 20px; padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .topics-lbl {
      font-size: 9.5px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 11px; font-family: var(--mono);
    }
    .topics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .topic-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px;
      border: 1.5px solid var(--border2); background: var(--surface2);
      font-family: var(--font); font-size: 12px; font-weight: 500;
      cursor: pointer; color: var(--text2); text-align: left;
      transition: all .17s; -webkit-tap-highlight-color: transparent; line-height: 1.35;
    }
    .topic-btn:hover, .topic-btn:active {
      border-color: var(--accent); background: var(--accent-l); color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(var(--accent-rgb), 0.12);
    }
    .t-icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .topics-loading {
      display: flex; align-items: center; gap: 7px;
      color: var(--text3); font-size: 11.5px; font-family: var(--mono);
    }
    .dots { display: flex; gap: 4px; }
    .dot { width: 4px; height: 4px; background: var(--text3); border-radius: 50%; animation: bdot 1.3s ease infinite; }
    .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
    @keyframes bdot { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-5px);opacity:1} }

    /* ═══════════════════════════════════════════
       MESSAGES
    ═══════════════════════════════════════════ */
    .msgs {
      padding-top: 20px; padding-bottom: 20px;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* Row */
    .msg { display: flex; gap: 10px; animation: msgIn .2s ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    .msg.bot  { flex-direction: row;         align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; align-items: flex-start; }

    /* Avatar */
    .av {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; overflow: hidden;
    }
    .av.bot  { background: var(--accent); align-self: flex-start; }
    .av.bot  img { width:100%; height:100%; object-fit:contain; border-radius:50%; }
    .av.user { background: var(--surface2); border: 1.5px solid var(--border2); align-self: flex-end; margin-bottom: 2px; }

    /* Msg body — flex:1 so it uses full column width */
    .msg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .msg.bot  .msg-body { align-items: flex-start; }
    .msg.user .msg-body { align-items: flex-end; }

    /* ── BOT BUBBLE: full width of body ── */
    .bubble {
      /* Bot bubble takes the FULL available width — no max-width cap */
      width: 100%;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px 18px 18px 18px;
      font-size: 14px; line-height: 1.8; color: var(--text);
      word-break: break-word; overflow-wrap: anywhere;
      box-shadow: 0 1px 4px rgba(0,0,0,.05), 0 3px 16px rgba(0,0,0,.04);
      overflow-x: auto; /* tables scroll on mobile */
    }

    /* ── USER BUBBLE: shrink to content, max ~70% ── */
    .bubble.user-b {
      width: auto;
      max-width: 72%;
      min-width: 40px;
      padding: 11px 16px;
      background: linear-gradient(135deg, #ddeaf6 0%, #c8dff2 100%);
      border: 1px solid rgba(var(--accent-rgb), .18);
      border-radius: 18px 4px 18px 18px;
      color: #1a2e42;
      font-size: 14px; line-height: 1.7;
      box-shadow: 0 1px 4px rgba(var(--accent-rgb),.08), 0 3px 12px rgba(var(--accent-rgb),.06);
    }

    /* ── Rich content styles — applied globally inside .bubble ── */
    .bubble h3 {
      font-size: 14.5px; font-weight: 800; margin: 14px 0 6px;
      color: var(--text); letter-spacing: -.01em;
    }
    .bubble h3:first-child { margin-top: 0; }
    .bubble h4 {
      font-size: 13.5px; font-weight: 700; margin: 10px 0 4px; color: var(--text);
    }
    .bubble h4:first-child { margin-top: 0; }
    .bubble p { margin: 4px 0; color: var(--text2); font-size: 14px; }
    .bubble p:first-child { margin-top: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; color: var(--text2); font-size: 13.5px; line-height: 1.6; }
    .bubble strong { font-weight: 700; color: var(--text); }
    .bubble br+br  { display: none; }

    /* ── Inline-styled tables from LLM ── */
    .bubble table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .bubble th {
      padding: 9px 12px; text-align: left; font-weight: 700;
      background: var(--surface2); color: var(--text);
      border-bottom: 2px solid var(--border2); white-space: nowrap;
    }
    .bubble td {
      padding: 8px 12px; color: var(--text2);
      border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .bubble tr:last-child td { border-bottom: none; }
    .bubble tr:hover td { background: #fafaf9; }

    /* Highlight divs from LLM */
    .bubble [style*="border-left"] {
      border-radius: 0 8px 8px 0 !important;
    }

    /* Meta — name + timestamp */
    .msg-meta {
      font-size: 11px; color: var(--text3); font-family: var(--mono);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .msg-badge {
      font-size: 8.5px; background: var(--accent-l); color: var(--accent);
      border: 1px solid var(--accent-b); padding: 1px 6px;
      border-radius: 4px; font-weight: 700; letter-spacing: .04em;
    }

    /* Streaming cursor */
    .cursor {
      display: inline-block; width: 2px; height: 13px;
      background: var(--accent); margin-left: 2px;
      vertical-align: middle; border-radius: 1px;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Typing indicator */
    .typing-row { display: flex; gap: 10px; align-items: flex-start; animation: msgIn .2s ease both; }
    .typing-bub {
      padding: 13px 18px; background: var(--surface);
      border: 1px solid var(--border2); border-radius: 4px 18px 18px 18px;
      display: flex; align-items: center; gap: 5px; box-shadow: var(--shadow);
    }
    .tdot { width:6px; height:6px; background:var(--text3); border-radius:50%; animation:bdot 1.3s ease infinite; }
    .tdot:nth-child(2){animation-delay:.15s} .tdot:nth-child(3){animation-delay:.3s}

    /* ═══════════════════════════════════════════
       INPUT
    ═══════════════════════════════════════════ */
    .input-area {
      flex-shrink: 0; background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px var(--pad);
      padding-bottom: calc(10px + var(--safe-b));
    }
    .input-col { width: 100%; max-width: var(--col); margin: 0 auto; }
    .input-box {
      background: var(--surface); border: 1.5px solid var(--border2);
      border-radius: 14px; padding: 4px 4px 4px 16px;
      display: flex; align-items: flex-end; gap: 8px;
      transition: border-color .2s, box-shadow .2s; box-shadow: var(--shadow);
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .10);
    }
    #txt {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: var(--font); font-size: 15px; color: var(--text);
      resize: none; max-height: 140px; line-height: 1.55;
      padding: 10px 0; min-height: 44px; -webkit-appearance: none;
    }
    #txt::placeholder { color: var(--text3); }
    #snd {
      width: 40px; height: 40px; background: var(--accent); border: none;
      border-radius: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-bottom: 4px;
      transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    #snd:hover:not(:disabled) { filter: brightness(1.12); }
    #snd:active:not(:disabled) { transform: scale(.92); }
    #snd:disabled { opacity: .35; cursor: not-allowed; }
    #snd svg { width: 17px; height: 17px; }
    .hint {
      font-size: 10.5px; color: var(--text3);
      text-align: center; margin-top: 6px; font-family: var(--mono);
    }
    .hint a { color: var(--accent); text-decoration: none; }

    /* ═══════════════════════════════════════════
       LOADING / ERROR
    ═══════════════════════════════════════════ */
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100dvh; flex-direction: column; gap: 14px; background: var(--bg);
    }
    .spin {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spn .75s linear infinite;
    }
    @keyframes spn { to { transform: rotate(360deg); } }
    .spin-lbl { font-family: var(--mono); font-size: 11.5px; color: var(--text3); }
    #err {
      display: none; align-items: center; justify-content: center;
      height: 100dvh; flex-direction: column; gap: 14px;
      text-align: center; padding: 32px; background: var(--bg);
    }
    .err-ico {
      width: 64px; height: 64px; border-radius: 18px;
      background: #fdf0ee; border: 1px solid rgba(192,57,43,.2);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    #err h2 { font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
    #err p  { font-size: 13px; color: var(--text2); max-width: 260px; line-height: 1.65; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      :root { --pad: 14px; --col: 100%; }
      .hdr-by   { display: none; }
      .hdr-name { font-size: 13.5px; }

      .welcome     { padding-top: 18px; padding-bottom: 14px; gap: 12px; }
      .w-card      { padding: 15px 13px; gap: 12px; }
      .w-logo      { width: 44px; height: 44px; border-radius: 12px; }
      .w-logo-fb   { font-size: 18px; }
      .w-name      { font-size: 14.5px; }
      .w-sub       { font-size: 12px; }
      .topics-card { padding: 13px 14px; }
      .topic-btn   { font-size: 11.5px; padding: 9px 10px; gap: 7px; }
      .t-icon      { width: 24px; height: 24px; font-size: 11px; }

      .msgs    { padding-top: 16px; padding-bottom: 14px; gap: 14px; }
      .bubble  { font-size: 13.5px; padding: 12px 14px; }
      .bubble.user-b { font-size: 13.5px; padding: 10px 13px; max-width: 82%; }
      .bubble h3 { font-size: 13.5px; }
      .bubble h4 { font-size: 12.5px; }
      .bubble p, .bubble li { font-size: 13px; }
      .bubble th, .bubble td { padding: 7px 9px; font-size: 12px; }

      .av  { width: 28px; height: 28px; }
      #txt { font-size: 16px; } /* prevent iOS zoom */
      .input-area { padding: 8px var(--pad); padding-bottom: calc(8px + var(--safe-b)); }
    }

    @media (max-width: 380px) {
      .topics-grid { grid-template-columns: 1fr; }
      .bubble.user-b { max-width: 88%; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .hdr     { height: 44px; }
      .welcome { padding-top: 10px; padding-bottom: 8px; gap: 8px; }
      .msgs    { padding-top: 10px; gap: 10px; }
      .input-area { padding-top: 6px; padding-bottom: calc(6px + var(--safe-b)); }
    }
  </style>
</head>

<div id="loading">
  <div class="spin"></div>

</div>

<div id="err">

</div>

<div id="ui" style="display:none; flex-direction:column; height:100dvh; height:100vh;">

  <!-- Header -->

      </div>
    </div>
  </div>

</div>

  subject:'📚',curriculum:'📚',result:'🏆',results:'🏆',achievement:'🏆',
  rank:'🏆',staff:'👩‍🏫',teacher:'👩‍🏫',faculty:'👩‍🏫',principal:'👩‍🏫',
  sport:'⚽',sports:'⚽',activity:'🎨',club:'🎭',hostel:'🏠',
  accommodation:'🏠',scholarship:'🎓',exam:'📝',test:'📝',
  about:'ℹ️',overview:'ℹ️',health:'🏥',medical:'🏥',food:'🍽️',
  cafeteria:'🍽️',online:'💻',digital:'💻',app:'📱',website:'🌐',
  event:'🎉',fest:'🎉',security:'🔒',branch:'📍',branches:'📍',
}
function icon(t) {
  const l = t.toLowerCase()
  for (const [k, v] of Object.entries(ICONS)) if (l.includes(k)) return v
  return '💡'
}

/* ═══════════════════════════════════════════
   LOGO HELPERS
═══════════════════════════════════════════ */
function injectImg(wrap, src, fb) {
  if (!src) return
  const img = document.createElement('img')
  img.src = src
  img.onerror = () => { try { wrap.removeChild(img) } catch {} }
  wrap.insertBefore(img, fb)
}
function botAvHtml() {
  const src = cfg?.logo_base64 || cfg?.logo_url || null
  if (src) return `<img src="${src}" style="width:100%;height:100%;object-fit:contain;border-radius:50%" onerror="this.style.display='none'"/>`
  return `<span style="font-size:11px;color:white;font-weight:800">${(cfg?.name||'A').charAt(0).toUpperCase()}</span>`
}

/* ═══════════════════════════════════════════
   HEX → RGB
═══════════════════════════════════════════ */
function hrgb(hex) {
  try { return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',') }
  catch { return '44,95,138' }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init() {
  if (!agentId) { showErr(); return }
  try {
    const r = await fetch(`${API}/chat/${agentId}/config`)
    if (!r.ok) { showErr(); return }
    cfg = await r.json()
    brand()
    $('loading').style.display = 'none'
    const ui = $('ui')
    ui.style.display = 'flex'; ui.style.flexDirection = 'column'
    $('topicsCard').style.display = 'block'
    loadTopics()
  } catch(e) { console.error(e); showErr() }
}

function brand() {
  const hex = (cfg.brand_color || '#2c5f8a').trim()
  const rgb = hrgb(hex)
  const rs  = document.documentElement.style
  rs.setProperty('--accent',     hex)
  rs.setProperty('--accent-rgb', rgb)
  rs.setProperty('--accent-l',   hex + '18')
  rs.setProperty('--accent-b',   hex + '44')

  document.title          = cfg.name || 'Chat'
  $('hName').textContent  = cfg.name || 'Assistant'
  $('wName').textContent  = 'Hi there! 👋'
  $('wSub').textContent   = cfg.welcome_message || 'How can I help you today?'

  const src  = cfg.logo_base64 || cfg.logo_url || null
  const init = (cfg.name || 'A').charAt(0).toUpperCase()

  const hL = $('hLogo'), hF = $('hFb')
  hL.style.background = hex; hF.textContent = init; hF.style.color = 'white'
  injectImg(hL, src, hF)

  const wL = $('wLogo'), wF = $('wFb')
  wL.style.background = hex; wF.textContent = init; wF.style.color = 'white'
  injectImg(wL, src, wF)

  $('snd').style.background = hex

  let meta = document.querySelector('meta[name="theme-color"]')
  if (!meta) { meta = document.createElement('meta'); meta.name = 'theme-color'; document.head.appendChild(meta) }
  meta.content = hex
}

/* ═══════════════════════════════════════════
   TOPICS
═══════════════════════════════════════════ */
async function loadTopics() {
  try {
    const r = await fetch(`${API}/chat/${agentId}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        question: 'List the main topics you cover as a simple comma-separated list. Only topic names, no descriptions, no numbering, max 8 topics.',
        history: [], _internal: true
      })
    })
    const d   = await r.json()
    const raw = (d.answer||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()
    let topics = raw.split(/[,\n•\-\*\|]/)
      .map(t => t.replace(/^\d+\.\s*/,'').trim())
      .filter(t => t.length > 2 && t.length < 45).slice(0,8)
    if (!topics.length) topics = (cfg.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean)
    showTopics(topics)
  } catch {
    showTopics((cfg.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean))
  }
}

function showTopics(topics) {
  const grid = $('topicsGrid'), load = $('topicsLoad')
  if (!topics.length) { $('topicsCard').style.display = 'none'; return }
  grid.innerHTML = topics.map(t=>`
    <button class="topic-btn" onclick="askTopic('${esc(t).replace(/'/g,"\\'")}')">
      <div class="t-icon">${icon(t)}</div>
      <span>${esc(t)}</span>
    </button>`).join('')
  load.style.display = 'none'
  grid.style.display = 'grid'
}
function askTopic(t) { $('txt').value = 'Tell me about ' + t; resize($('txt')); send() }

/* ═══════════════════════════════════════════
   INPUT
═══════════════════════════════════════════ */
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) { e.preventDefault(); send() }
}
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,140)+'px' }

/* ═══════════════════════════════════════════
   SEND — SSE streaming
═══════════════════════════════════════════ */
async function send() {
  const input = $('txt')
  const text  = input.value.trim()
  if (!text || busy) return

  const w = $('welcome')
  if (w) { w.style.transition='opacity .18s ease'; w.style.opacity='0'; setTimeout(()=>{ try{w.remove()}catch{} },190) }

  addUser(text)
  input.value = ''; input.style.height = 'auto'
  if (window.innerWidth <= 600) input.blur()

  busy = true; $('snd').disabled = true

  const typingEl = addTyping()
  let botBubble  = null
  let streamed   = ''
  let firstChunk = true

  try {
    const resp = await fetch(`${API}/chat/${agentId}/stream`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ question:text, history:hist, session_id:sid, visitor_id:vid })
    })
    if (!resp.ok) throw new Error('HTTP ' + resp.status)

    const reader  = resp.body.getReader()
    const decoder = new TextDecoder()
    let sseBuf    = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      sseBuf += decoder.decode(value, { stream:true })
      const lines = sseBuf.split('\n')
      sseBuf = lines.pop()

      for (const line of lines) {
        if (!line.startsWith('data:')) continue
        const raw = line.slice(5).trim()
        if (!raw) continue
        let evt; try { evt = JSON.parse(raw) } catch { continue }

        if (evt.type === 'chunk') {
          if (firstChunk) { typingEl.remove(); botBubble = makeBotBubble(); firstChunk = false }
          streamed += evt.html
          botBubble.innerHTML = streamed + '<span class="cursor"></span>'
          scrollBottom()

        } else if (evt.type === 'done') {
          if (botBubble) botBubble.innerHTML = streamed
          hist.push({ role:'user',      content:text })
          hist.push({ role:'assistant', content:streamed })
          if (hist.length > 20) hist = hist.slice(-20)
          scrollBottom()

        } else if (evt.type === 'error') {
          if (firstChunk) typingEl.remove()
          const m = `<p style="color:var(--red)">${evt.message||'Something went wrong.'}</p>`
          if (botBubble) botBubble.innerHTML = m; else addBot(m)
        }
      }
    }
    if (firstChunk) { typingEl.remove(); addBot('<p>Sorry, I could not find an answer to that.</p>') }

  } catch(e) {
    console.error(e)
    if (firstChunk) typingEl.remove()
    const m = "<p>Sorry, having trouble connecting. Please try again.</p>"
    if (botBubble) botBubble.innerHTML = m; else addBot(m)
  }

  busy = false; $('snd').disabled = false
}

/* ═══════════════════════════════════════════
   MESSAGE BUILDERS
═══════════════════════════════════════════ */
function addUser(text) {
  const el = document.createElement('div')
  el.className = 'msg user'
  el.innerHTML = `
    <div class="av user">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" style="width:13px;height:13px">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="msg-body">
      <div class="msg-meta">You</div>
      <div class="bubble user-b">${esc(text).replace(/\n/g,'<br>')}</div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function addBot(html) {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-meta">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble">${html}</div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function makeBotBubble() {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-meta">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble"></div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el.querySelector('.bubble')
}

function addTyping() {
  const el = document.createElement('div')
  el.className = 'typing-row'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="typing-bub">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function $(id) { return document.getElementById(id) }
function scrollBottom() {
  const s = $('scroll')
  requestAnimationFrame(() => { s.scrollTop = s.scrollHeight })
}
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }
function showErr() {
  $('loading').style.display = 'none'
  $('err').style.display     = 'flex'
}

/* Prevent 300ms delay on iOS send button */
$('snd').addEventListener('touchend', e => { e.preventDefault(); send() })

/* Fix mobile dvh on keyboard open/close */
function setVh() { document.documentElement.style.setProperty('--vh', window.innerHeight*.01+'px') }
setVh(); window.addEventListener('resize', setVh, { passive:true })

/* Scroll input into view when iOS keyboard opens */
$('txt').addEventListener('focus', () => {
  setTimeout(() => $('txt').scrollIntoView({ behavior:'smooth', block:'nearest' }), 350)
})

init()
</script>
