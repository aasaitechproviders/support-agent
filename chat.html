<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #f5f4f0;
      --surface:   #ffffff;
      --surface2:  #f0eeeb;
      --border:    rgba(0,0,0,0.08);
      --border2:   rgba(0,0,0,0.13);
      --text:      #1a1917;
      --text2:     #5c5a57;
      --text3:     #a09e99;
      --accent:    #2c5f8a;
      --accent-l:  rgba(44,95,138,0.09);
      --accent-b:  rgba(44,95,138,0.22);
      --accent-rgb:44,95,138;
      --green:     #1d7a5f;
      --red:       #c0392b;
      --font:      'Plus Jakarta Sans', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --sh:        0 1px 3px rgba(0,0,0,0.07), 0 4px 18px rgba(0,0,0,0.05);
      --safe-b:    env(safe-area-inset-bottom, 0px);
      --safe-t:    env(safe-area-inset-top, 0px);
      /* Full-width layout — no max-width column centering */
      --pad-x:     24px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER  — full width
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--pad-x);
      padding-top: var(--safe-t);
      height: calc(60px + var(--safe-t));
      display: flex; align-items: center; gap: 13px;
      flex-shrink: 0; z-index: 20;
      box-shadow: 0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,0.04);
    }
    .hdr-logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(var(--accent-rgb),.3);
    }
    .hdr-logo img { width:100%; height:100%; object-fit:contain; border-radius:12px; }
    .hdr-fb { font-size:17px; color:white; font-weight:800; }
    .hdr-info { flex:1; min-width:0; }
    .hdr-name {
      font-size:14.5px; font-weight:800; letter-spacing:-.022em;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .hdr-status {
      display:flex; align-items:center; gap:5px;
      font-size:10.5px; color:var(--text3); margin-top:2px; font-family:var(--mono);
    }
    .sdot {
      width:6px; height:6px; background:var(--green);
      border-radius:50%; flex-shrink:0;
      animation:pulse 2.4s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.7)} }
    .hdr-by { font-size:10px; color:var(--text3); font-family:var(--mono); white-space:nowrap; flex-shrink:0; }
    .hdr-by a { color:var(--accent); text-decoration:none; font-weight:600; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SCROLL — full width, no centering
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .scroll {
      flex:1; overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:contain;
      background: linear-gradient(160deg, #f5f4f0 0%, #edf1f7 55%, #f0eeeb 100%);
    }
    .scroll::-webkit-scrollbar { width:3px; }
    .scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    /* Inner wrapper — padding only, no max-width */
    .pad { padding-left:var(--pad-x); padding-right:var(--pad-x); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       WELCOME
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .welcome {
      padding-top:28px; padding-bottom:24px;
      display:flex; flex-direction:column; gap:18px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Agent intro card */
    .w-card {
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:20px; padding:22px 24px;
      display:flex; align-items:center; gap:18px;
      box-shadow:var(--sh);
    }
    .w-logo {
      width:58px; height:58px; border-radius:16px;
      background:var(--accent); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
      box-shadow:0 4px 18px rgba(var(--accent-rgb),.3);
    }
    .w-logo img { width:100%; height:100%; object-fit:contain; border-radius:16px; }
    .w-logo-fb { font-size:24px; color:white; font-weight:800; }
    .w-text-wrap { flex:1; min-width:0; }
    .w-name { font-size:18px; font-weight:800; letter-spacing:-.025em; margin-bottom:5px; }
    .w-sub  { font-size:13.5px; color:var(--text2); line-height:1.65; }

    /* Topics section label */
    .topics-label {
      font-size:11px; font-weight:700; color:var(--text3);
      text-transform:uppercase; letter-spacing:.1em;
      font-family:var(--mono); padding:0 2px;
    }

    /* Topics grid — 4 cols desktop, 2 mobile */
    .topics-grid {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:12px;
    }

    /* Each topic card — rich with icon + title + description */
    .topic-card {
      background:var(--surface); border:1.5px solid var(--border2);
      border-radius:16px; padding:16px 16px 14px;
      display:flex; flex-direction:column; gap:11px;
      cursor:pointer; text-align:left;
      transition:all .18s ease;
      -webkit-tap-highlight-color:transparent;
      box-shadow:0 1px 3px rgba(0,0,0,.05);
    }
    .topic-card:hover, .topic-card:active {
      border-color:var(--accent);
      background:linear-gradient(135deg, #fff 0%, var(--accent-l) 100%);
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(var(--accent-rgb),.14);
    }
    .topic-card:active { transform:translateY(0); }
    .tc-icon {
      width:40px; height:40px; border-radius:11px;
      background:var(--accent-l); border:1px solid var(--accent-b);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
    }
    .tc-title {
      font-size:13px; font-weight:700; color:var(--text);
      line-height:1.3; letter-spacing:-.01em;
    }
    .tc-desc {
      font-size:12px; color:var(--text2); line-height:1.55;
      margin-top:-4px;
    }

    /* Loading skeleton */
    .topics-loading {
      display:flex; align-items:center; gap:8px;
      color:var(--text3); font-size:12px; font-family:var(--mono);
      padding:4px 0;
    }
    .dots { display:flex; gap:4px; }
    .dot { width:5px; height:5px; background:var(--text3); border-radius:50%; animation:bdot 1.3s ease infinite; }
    .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
    @keyframes bdot { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-5px);opacity:1} }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       MESSAGES — full width
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .msgs {
      padding-top:20px; padding-bottom:20px;
      display:flex; flex-direction:column; gap:20px;
    }

    .msg { display:flex; gap:12px; animation:msgIn .22s ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.bot  { flex-direction:row;         align-items:flex-start; }
    .msg.user { flex-direction:row-reverse; align-items:flex-start; }

    .av {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; flex-shrink:0; overflow:hidden;
    }
    .av.bot  { background:var(--accent); align-self:flex-start; }
    .av.bot  img { width:100%; height:100%; object-fit:contain; border-radius:50%; }
    .av.user { background:var(--surface2); border:1.5px solid var(--border2); align-self:flex-end; margin-bottom:2px; }

    /* Body — flex:1 fills ALL remaining width after avatar */
    .msg-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
    .msg.bot  .msg-body { align-items:flex-start; }
    .msg.user .msg-body { align-items:flex-end; }

    /* BOT BUBBLE — full width of body, professional card */
    .bubble {
      width:100%;
      padding:16px 20px;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:4px 18px 18px 18px;
      font-size:14.5px; line-height:1.85; color:var(--text);
      word-break:break-word; overflow-wrap:anywhere;
      box-shadow:0 2px 8px rgba(0,0,0,.05), 0 8px 28px rgba(0,0,0,.04);
      overflow-x:auto;
    }

    /* USER BUBBLE — fits content, max 60% width */
    .bubble.user-b {
      width:auto; max-width:60%; min-width:40px;
      padding:12px 17px;
      background:linear-gradient(135deg, #ddeaf6 0%, #c8dff2 100%);
      border:1px solid rgba(var(--accent-rgb),.18);
      border-radius:18px 4px 18px 18px;
      color:#1a2e42; font-size:14.5px; line-height:1.75;
      box-shadow:0 2px 6px rgba(var(--accent-rgb),.1), 0 6px 18px rgba(var(--accent-rgb),.07);
    }

    /* Rich HTML from LLM */
    .bubble h3 { font-size:15px; font-weight:800; margin:16px 0 7px; color:var(--text); letter-spacing:-.015em; }
    .bubble h3:first-child { margin-top:0; }
    .bubble h4 { font-size:13.5px; font-weight:700; margin:12px 0 5px; color:var(--text); }
    .bubble h4:first-child { margin-top:0; }
    .bubble p  { margin:5px 0; color:var(--text2); font-size:14px; }
    .bubble p:first-child { margin-top:0; }
    .bubble ul, .bubble ol { padding-left:20px; margin:8px 0; }
    .bubble li { margin:4px 0; color:var(--text2); font-size:14px; line-height:1.65; }
    .bubble strong { font-weight:700; color:var(--text); }
    .bubble br+br  { display:none; }

    /* Tables from LLM */
    .bubble table  { width:100%; border-collapse:collapse; font-size:13.5px; margin:8px 0; }
    .bubble thead tr { background:var(--surface2); }
    .bubble th {
      padding:10px 14px; text-align:left; font-weight:700;
      color:var(--text); border-bottom:2px solid var(--border2);
      white-space:nowrap; font-size:12.5px; letter-spacing:.01em;
    }
    .bubble td {
      padding:9px 14px; color:var(--text2);
      border-bottom:1px solid var(--border); vertical-align:top;
    }
    .bubble tr:last-child td { border-bottom:none; }
    .bubble tbody tr:hover td { background:#fafaf9; }

    /* Highlight cards from LLM inline styles */
    .bubble div[style*="border-left"] { border-radius:0 10px 10px 0 !important; margin:10px 0 !important; }
    .bubble div[style*="background:#f0"] { border-radius:10px !important; }

    /* Meta row */
    .msg-meta {
      font-size:11px; color:var(--text3); font-family:var(--mono);
      display:flex; align-items:center; gap:7px;
    }
    .msg-badge {
      font-size:8.5px; background:var(--accent-l); color:var(--accent);
      border:1px solid var(--accent-b); padding:1px 6px;
      border-radius:4px; font-weight:700; letter-spacing:.05em;
    }

    /* Streaming cursor */
    .cursor {
      display:inline-block; width:2px; height:14px;
      background:var(--accent); margin-left:2px;
      vertical-align:middle; border-radius:1px;
      animation:blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Typing indicator */
    .typing-row { display:flex; gap:12px; align-items:flex-start; animation:msgIn .22s ease both; }
    .typing-bub {
      padding:14px 18px; background:var(--surface);
      border:1px solid var(--border2);
      border-radius:4px 18px 18px 18px;
      display:flex; align-items:center; gap:5px;
      box-shadow:var(--sh);
    }
    .tdot { width:7px; height:7px; background:var(--text3); border-radius:50%; animation:bdot 1.3s ease infinite; }
    .tdot:nth-child(2){animation-delay:.15s} .tdot:nth-child(3){animation-delay:.3s}

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       INPUT — full width
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .input-area {
      flex-shrink:0; background:var(--bg);
      border-top:1px solid var(--border);
      padding:12px var(--pad-x);
      padding-bottom:calc(12px + var(--safe-b));
    }
    .input-box {
      background:var(--surface); border:1.5px solid var(--border2);
      border-radius:16px; padding:5px 5px 5px 18px;
      display:flex; align-items:flex-end; gap:8px;
      transition:border-color .2s, box-shadow .2s;
      box-shadow:var(--sh);
    }
    .input-box:focus-within {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(var(--accent-rgb),.10), var(--sh);
    }
    #txt {
      flex:1; border:none; background:transparent; outline:none;
      font-family:var(--font); font-size:15px; color:var(--text);
      resize:none; max-height:150px; line-height:1.6;
      padding:10px 0; min-height:44px; -webkit-appearance:none;
    }
    #txt::placeholder { color:var(--text3); }
    #snd {
      width:42px; height:42px; background:var(--accent); border:none;
      border-radius:12px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-bottom:3px;
      transition:all .15s; -webkit-tap-highlight-color:transparent;
    }
    #snd:hover:not(:disabled) { filter:brightness(1.12); }
    #snd:active:not(:disabled) { transform:scale(.91); }
    #snd:disabled { opacity:.32; cursor:not-allowed; }
    #snd svg { width:17px; height:17px; }
    .hint {
      font-size:10.5px; color:var(--text3);
      text-align:center; margin-top:7px; font-family:var(--mono);
    }
    .hint a { color:var(--accent); text-decoration:none; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LOADING / ERROR
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #loading {
      display:flex; align-items:center; justify-content:center;
      height:100dvh; flex-direction:column; gap:14px; background:var(--bg);
    }
    .spin {
      width:32px; height:32px;
      border:2.5px solid var(--border2); border-top-color:var(--accent);
      border-radius:50%; animation:spn .75s linear infinite;
    }
    @keyframes spn { to{transform:rotate(360deg)} }
    .spin-lbl { font-family:var(--mono); font-size:12px; color:var(--text3); }
    #err {
      display:none; align-items:center; justify-content:center;
      height:100dvh; flex-direction:column; gap:14px;
      text-align:center; padding:32px; background:var(--bg);
    }
    .err-ico {
      width:64px; height:64px; border-radius:18px;
      background:#fdf0ee; border:1px solid rgba(192,57,43,.18);
      display:flex; align-items:center; justify-content:center; font-size:28px;
    }
    #err h2 { font-size:19px; font-weight:800; }
    #err p  { font-size:13px; color:var(--text2); max-width:260px; line-height:1.65; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width:900px) {
      .topics-grid { grid-template-columns:repeat(3,1fr); }
    }
    @media (max-width:640px) {
      :root { --pad-x:16px; }
      .hdr-by   { display:none; }
      .hdr-name { font-size:13.5px; }
      .hdr { height:calc(54px + var(--safe-t)); }

      .welcome    { padding-top:18px; padding-bottom:16px; gap:14px; }
      .w-card     { padding:16px 15px; gap:14px; }
      .w-logo     { width:48px; height:48px; border-radius:13px; }
      .w-logo-fb  { font-size:20px; }
      .w-name     { font-size:15.5px; }
      .w-sub      { font-size:12.5px; }

      .topics-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .topic-card  { padding:13px 13px 12px; gap:9px; }
      .tc-icon     { width:36px; height:36px; font-size:18px; border-radius:9px; }
      .tc-title    { font-size:12.5px; }
      .tc-desc     { font-size:11.5px; }

      .msgs  { padding-top:16px; padding-bottom:14px; gap:16px; }
      .bubble { font-size:14px; padding:14px 16px; }
      .bubble.user-b { font-size:14px; padding:11px 15px; max-width:78%; }
      .bubble h3 { font-size:14px; }
      .bubble th, .bubble td { padding:8px 10px; font-size:12.5px; }

      .av  { width:30px; height:30px; }
      #txt { font-size:16px; } /* prevent iOS auto-zoom */
      .input-area { padding:10px var(--pad-x); padding-bottom:calc(10px + var(--safe-b)); }
    }
    @media (max-width:380px) {
      .topics-grid  { grid-template-columns:1fr 1fr; }
      .tc-desc      { display:none; } /* hide desc on very small screens */
      .bubble.user-b { max-width:88%; }
    }
    @media (max-height:520px) and (orientation:landscape) {
      .hdr    { height:44px; }
      .welcome { padding-top:10px; gap:10px; }
      .msgs   { padding-top:10px; gap:10px; }
      .input-area { padding:7px var(--pad-x); padding-bottom:calc(7px + var(--safe-b)); }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="spin-lbl">Loading agent…</div>
</div>

<div id="err">
  <div class="err-ico">🤖</div>
  <h2>Agent not found</h2>
  <p>This agent may have been removed or the link is invalid.</p>
</div>

<div id="ui" style="display:none;flex-direction:column;height:100dvh;">

  <!-- Header — full width -->
  <div class="hdr">
    <div class="hdr-logo" id="hLogo"><span class="hdr-fb" id="hFb">A</span></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hName">Loading…</div>
      <div class="hdr-status"><div class="sdot"></div><span>Online · Ready to help</span></div>
    </div>
    <div class="hdr-by">by <a href="https://aasaitech.in" target="_blank">Aasai</a></div>
  </div>

  <!-- Scroll — full width, padding only -->
  <div class="scroll" id="scroll">

    <!-- Welcome -->
    <div class="pad">
      <div class="welcome" id="welcome">

        <!-- Agent card -->
        <div class="w-card">
          <div class="w-logo" id="wLogo"><span class="w-logo-fb" id="wFb">A</span></div>
          <div class="w-text-wrap">
            <div class="w-name" id="wName">Hi there! 👋</div>
            <div class="w-sub"  id="wSub">How can I help you today?</div>
          </div>
        </div>

        <!-- Topics -->
        <div class="topics-label">Explore Topics</div>
        <div class="topics-loading" id="topicsLoad">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <span>Analysing knowledge base…</span>
        </div>
        <div class="topics-grid" id="topicsGrid" style="display:none"></div>

      </div>
    </div>

    <!-- Messages — same full-width padding -->
    <div class="pad">
      <div class="msgs" id="msgs"></div>
    </div>

  </div><!-- /scroll -->

  <!-- Input — full width -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="txt" placeholder="Ask anything…" rows="1"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button id="snd" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">
      Powered by <a href="https://aasaitech.in" target="_blank">Aasai AI</a> · Responses may not always be accurate
    </div>
  </div>

</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const API     = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
const agentId = new URLSearchParams(location.search).get('agent')

let vid = localStorage.getItem('aasai_vid')
if (!vid) {
  vid = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36)
  localStorage.setItem('aasai_vid', vid)
}
const sid = 's_' + Math.random().toString(36).slice(2) + Date.now().toString(36)

let cfg  = null
let busy = false
let hist = []

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOGO HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function injectImg(wrap, src, fb) {
  if (!src) return
  const img = document.createElement('img')
  img.src = src
  img.onerror = () => { try { wrap.removeChild(img) } catch {} }
  wrap.insertBefore(img, fb)
}
function botAvHtml() {
  const src = cfg?.logo_base64 || cfg?.logo_url || null
  if (src) return `<img src="${src}" style="width:100%;height:100%;object-fit:contain;border-radius:50%" onerror="this.style.display='none'"/>`
  return `<span style="font-size:12px;color:white;font-weight:800">${(cfg?.name||'A').charAt(0).toUpperCase()}</span>`
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEX → RGB
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function hrgb(hex) {
  try { return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',') }
  catch { return '44,95,138' }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INIT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function init() {
  if (!agentId) { showErr(); return }
  try {
    const r = await fetch(`${API}/chat/${agentId}/config`)
    if (!r.ok) { showErr(); return }
    cfg = await r.json()
    brand()
    $('loading').style.display = 'none'
    const ui = $('ui')
    ui.style.display = 'flex'
    loadTopics()
  } catch(e) { console.error(e); showErr() }
}

function brand() {
  const hex = (cfg.brand_color || '#2c5f8a').trim()
  const rgb = hrgb(hex)
  const rs  = document.documentElement.style
  rs.setProperty('--accent',     hex)
  rs.setProperty('--accent-rgb', rgb)
  rs.setProperty('--accent-l',   `rgba(${rgb},0.09)`)
  rs.setProperty('--accent-b',   `rgba(${rgb},0.22)`)

  document.title          = cfg.name || 'Chat'
  $('hName').textContent  = cfg.name || 'Assistant'
  $('wName').textContent  = 'Hi there! 👋'
  $('wSub').textContent   = cfg.welcome_message || 'How can I help you today?'

  const src  = cfg.logo_base64 || cfg.logo_url || null
  const init = (cfg.name || 'A').charAt(0).toUpperCase()

  const hL = $('hLogo'), hF = $('hFb')
  hL.style.background = hex; hF.textContent = init; hF.style.color = 'white'
  injectImg(hL, src, hF)

  const wL = $('wLogo'), wF = $('wFb')
  wL.style.background = hex; wF.textContent = init; wF.style.color = 'white'
  injectImg(wL, src, wF)

  $('snd').style.background = hex

  let meta = document.querySelector('meta[name="theme-color"]')
  if (!meta) { meta = document.createElement('meta'); meta.name='theme-color'; document.head.appendChild(meta) }
  meta.content = hex
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOPICS  — Ask Gemini for JSON with
   icon + title + description + question
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function loadTopics() {
  const prompt = `Analyse the knowledge base and return EXACTLY 8 topic cards that visitors would want to ask about.
Return ONLY a raw JSON array — no markdown, no explanation, no backticks.
Each object must have these exact keys:
  "icon"  — a single relevant emoji
  "title" — 2-4 word topic name
  "desc"  — one short sentence (max 10 words) describing what they can learn
  "q"     — the natural question a visitor would ask

Example format:
[{"icon":"💰","title":"Fee Structure","desc":"Course fees and payment options.","q":"What are the fees for your courses?"},...]

Base topics strictly on the knowledge base content. Return exactly 8 items.`

  try {
    const r = await fetch(`${API}/chat/${agentId}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question: prompt, history:[], _internal:true })
    })
    const d   = await r.json()
    let raw   = (d.answer||'').replace(/<[^>]*>/g,'').trim()
    // Strip any accidental markdown fences
    raw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/,'').trim()
    // Extract JSON array
    const start = raw.indexOf('[')
    const end   = raw.lastIndexOf(']')
    if (start === -1 || end === -1) throw new Error('No JSON array found')
    const topics = JSON.parse(raw.slice(start, end+1))
    if (!Array.isArray(topics) || !topics.length) throw new Error('Empty array')
    renderTopics(topics)
  } catch(e) {
    console.warn('Topic extraction failed, using fallback', e)
    // Fallback from config suggestions
    const fallback = (cfg.suggestions||[]).map(s=>({
      icon:'💡',
      title: s.replace(/[?]/g,'').trim().slice(0,30),
      desc:'Ask me about this topic.',
      q: s
    })).slice(0,8)
    if (fallback.length) renderTopics(fallback)
    else $('topicsLoad').style.display = 'none'
  }
}

function renderTopics(topics) {
  const grid = $('topicsGrid')
  grid.innerHTML = topics.map(t => `
    <div class="topic-card" onclick="askQ(${JSON.stringify(t.q)})">
      <div class="tc-icon">${t.icon || '💡'}</div>
      <div class="tc-title">${esc(t.title)}</div>
      <div class="tc-desc">${esc(t.desc)}</div>
    </div>`).join('')
  $('topicsLoad').style.display = 'none'
  grid.style.display = 'grid'
}

function askQ(q) {
  $('txt').value = q
  resize($('txt'))
  send()
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INPUT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey && window.innerWidth>600) { e.preventDefault(); send() }
}
function resize(el) {
  el.style.height='auto'
  el.style.height=Math.min(el.scrollHeight,150)+'px'
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SEND — SSE streaming
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function send() {
  const input = $('txt')
  const text  = input.value.trim()
  if (!text || busy) return

  // Fade out + remove welcome
  const w = $('welcome')
  if (w) {
    w.style.transition = 'opacity .2s ease'
    w.style.opacity    = '0'
    setTimeout(() => { try { w.remove() } catch {} }, 210)
  }

  addUser(text)
  input.value = ''
  input.style.height = 'auto'
  if (window.innerWidth <= 600) input.blur()

  busy = true
  $('snd').disabled = true

  const typingEl = addTyping()
  let botBubble  = null
  let streamed   = ''
  let firstChunk = true

  try {
    const resp = await fetch(`${API}/chat/${agentId}/stream`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question:text, history:hist, session_id:sid, visitor_id:vid })
    })
    if (!resp.ok) throw new Error('HTTP ' + resp.status)

    const reader  = resp.body.getReader()
    const decoder = new TextDecoder()
    let sseBuf    = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      sseBuf += decoder.decode(value, { stream:true })
      const lines = sseBuf.split('\n')
      sseBuf = lines.pop()

      for (const line of lines) {
        if (!line.startsWith('data:')) continue
        const raw = line.slice(5).trim()
        if (!raw) continue
        let evt; try { evt=JSON.parse(raw) } catch { continue }

        if (evt.type === 'chunk') {
          if (firstChunk) { typingEl.remove(); botBubble=makeBotBubble(); firstChunk=false }
          streamed += evt.html
          botBubble.innerHTML = streamed + '<span class="cursor"></span>'
          scrollBottom()

        } else if (evt.type === 'done') {
          if (botBubble) botBubble.innerHTML = streamed
          hist.push({ role:'user',      content:text })
          hist.push({ role:'assistant', content:streamed })
          if (hist.length > 20) hist = hist.slice(-20)
          scrollBottom()

        } else if (evt.type === 'error') {
          if (firstChunk) typingEl.remove()
          const m = `<p style="color:var(--red)">${evt.message||'Something went wrong.'}</p>`
          if (botBubble) botBubble.innerHTML=m; else addBot(m)
        }
      }
    }
    if (firstChunk) { typingEl.remove(); addBot('<p>Sorry, I could not find an answer to that.</p>') }

  } catch(e) {
    console.error(e)
    if (firstChunk) typingEl.remove()
    const m = "<p>Sorry, having trouble connecting. Please try again.</p>"
    if (botBubble) botBubble.innerHTML=m; else addBot(m)
  }

  busy = false
  $('snd').disabled = false
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MESSAGE BUILDERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function addUser(text) {
  const el = document.createElement('div')
  el.className = 'msg user'
  el.innerHTML = `
    <div class="av user">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" style="width:13px;height:13px">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="msg-body">
      <div class="msg-meta">You</div>
      <div class="bubble user-b">${esc(text).replace(/\n/g,'<br>')}</div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function addBot(html) {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-meta">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble">${html}</div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function makeBotBubble() {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-meta">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble"></div>
      <div class="msg-meta">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el.querySelector('.bubble')
}

function addTyping() {
  const el = document.createElement('div')
  el.className = 'typing-row'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="typing-bub">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   UTILS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function $(id) { return document.getElementById(id) }
function scrollBottom() { const s=$('scroll'); requestAnimationFrame(()=>{ s.scrollTop=s.scrollHeight }) }
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function ts()  { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }
function showErr() { $('loading').style.display='none'; $('err').style.display='flex' }

/* iOS: prevent 300ms delay on send */
$('snd').addEventListener('touchend', e => { e.preventDefault(); send() })

/* Fix dvh on mobile keyboard open */
function setVh() { document.documentElement.style.setProperty('--vh', window.innerHeight*.01+'px') }
setVh(); window.addEventListener('resize', setVh, { passive:true })

/* Scroll into view on focus (iOS keyboard) */
$('txt').addEventListener('focus', () => {
  setTimeout(() => $('txt').scrollIntoView({ behavior:'smooth', block:'nearest' }), 350)
})

init()
</script>
</body>
</html>
