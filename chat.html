<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS  —  warm neutral palette, exact
       match to the reference Aasai Tech AI app
    ═══════════════════════════════════════════════ */
    :root{
      --bg:#f5f4f0; --surface:#ffffff; --surface2:#f0eeeb;
      --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.13);
      --text:#1a1917; --text2:#6b6860; --text3:#a09e99;
      --accent:#2c5f8a; --accent-l:#e8f0f8; --accent-b:rgba(44,95,138,0.25);
      --accent-rgb:44,95,138; --green:#1d7a5f; --red:#c0392b;
      --font:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
      --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.04);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);
      height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:15px;
    }

    /* ══ HEADER ══ */
    .hdr{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 18px;padding-top:var(--safe-top);
      height:calc(58px + var(--safe-top));
      display:flex;align-items:center;gap:13px;
      flex-shrink:0;z-index:10;
      box-shadow:0 1px 0 var(--border),0 2px 14px rgba(0,0,0,.03);
    }
    .hdr-logo{
      width:42px;height:42px;border-radius:12px;background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;flex-shrink:0;
      box-shadow:0 3px 10px rgba(var(--accent-rgb),.3);
      transition:box-shadow .2s;
    }
    .hdr-logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}
    .hdr-fb{font-size:17px;color:white;font-weight:800;letter-spacing:-.02em}
    .hdr-info{flex:1;min-width:0}
    .hdr-name{
      font-size:14.5px;font-weight:800;letter-spacing:-.022em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .hdr-status{
      display:flex;align-items:center;gap:5px;
      font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono);
    }
    .status-dot{
      width:6px;height:6px;background:var(--green);border-radius:50%;
      animation:pulse 2.5s ease infinite;
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
    .hdr-by{
      margin-left:auto;font-size:10px;color:var(--text3);
      white-space:nowrap;font-family:var(--mono);
    }
    .hdr-by a{color:var(--accent);text-decoration:none;font-weight:600}
    .hdr-by a:hover{text-decoration:underline}

    /* ══ SCROLL AREA ══ */
    .msgs-scroll{
      flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      background:linear-gradient(160deg,#f5f4f0 0%,#edf1f7 55%,#f0eeeb 100%);
    }
    .msgs-scroll::-webkit-scrollbar{width:3px}
    .msgs-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

    /* ══ WELCOME ══ */
    .welcome{
      padding:28px 18px 16px;
      display:flex;flex-direction:column;align-items:center;gap:14px;
      animation:fadeUp .35s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .welcome-card{
      background:var(--surface);border:1px solid var(--border2);
      border-radius:20px;padding:22px 20px;
      display:flex;align-items:center;gap:16px;
      width:100%;max-width:540px;box-shadow:var(--shadow);
    }
    .w-logo{
      width:54px;height:54px;border-radius:15px;background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;flex-shrink:0;
      box-shadow:0 4px 18px rgba(var(--accent-rgb),.28);
    }
    .w-logo img{width:100%;height:100%;object-fit:contain;border-radius:15px}
    .w-logo-fb{font-size:22px;color:white;font-weight:800}
    .w-name{font-size:17px;font-weight:800;letter-spacing:-.025em;margin-bottom:5px}
    .w-sub{font-size:13.5px;color:var(--text2);line-height:1.65}

    /* ══ TOPICS ══ */
    .topics-card{
      background:var(--surface);border:1px solid var(--border2);
      border-radius:20px;padding:18px;
      width:100%;max-width:540px;box-shadow:var(--shadow);
    }
    .topics-lbl{
      font-size:10px;font-weight:700;color:var(--text3);
      text-transform:uppercase;letter-spacing:.1em;
      margin-bottom:12px;font-family:var(--mono);
    }
    .topics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .topic-btn{
      display:flex;align-items:center;gap:9px;
      padding:11px 13px;border-radius:11px;
      border:1.5px solid var(--border2);background:var(--surface2);
      font-family:var(--font);font-size:12.5px;font-weight:500;
      cursor:pointer;color:var(--text2);text-align:left;
      transition:all .18s;-webkit-tap-highlight-color:transparent;
    }
    .topic-btn:hover,.topic-btn:active{
      border-color:var(--accent);background:var(--accent-l);color:var(--accent);
      transform:translateY(-1px);
      box-shadow:0 4px 12px rgba(var(--accent-rgb),.13);
    }
    .t-icon{
      width:28px;height:28px;border-radius:7px;
      background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;flex-shrink:0;
    }
    .topics-loading{
      display:flex;align-items:center;gap:8px;
      color:var(--text3);font-size:12px;font-family:var(--mono);
    }
    .dots{display:flex;gap:4px}
    .dot{width:4px;height:4px;background:var(--text3);border-radius:50%;animation:bounce 1.3s ease infinite}
    .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

    /* ══ MESSAGES LIST ══ */
    .msgs-inner{
      padding:20px 18px 12px;
      display:flex;flex-direction:column;gap:18px;
    }

    /* ══ MESSAGE ROW ══ */
    .msg{display:flex;gap:10px;animation:msgIn .22s ease both}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot {flex-direction:row;        align-items:flex-start}
    .msg.user{flex-direction:row-reverse;align-items:flex-start}

    /* Avatars */
    .av{
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden;
    }
    .av.bot {background:var(--accent);align-self:flex-start}
    .av.bot img{width:100%;height:100%;object-fit:contain;border-radius:50%}
    .av.user{
      background:var(--surface2);border:1.5px solid var(--border2);
      align-self:flex-end;margin-bottom:2px;
    }

    /* Body */
    .msg-body{max-width:74%;min-width:0;display:flex;flex-direction:column;gap:4px}
    .msg.bot  .msg-body{align-items:flex-start}
    .msg.user .msg-body{align-items:flex-end}

    /* Name label */
    .msg-name{
      font-size:11.5px;font-weight:600;color:var(--text3);
      display:flex;align-items:center;gap:6px;font-family:var(--mono);
    }
    .msg-badge{
      font-size:9px;background:var(--accent-l);color:var(--accent);
      border:1px solid var(--accent-b);
      padding:1px 6px;border-radius:4px;font-weight:700;letter-spacing:.04em;
    }

    /* ── Bot bubble: white card, flat bottom-left ── */
    .bubble{
      padding:13px 17px;
      background:var(--surface);border:1px solid var(--border2);
      border-radius:18px 18px 18px 4px;
      font-size:14px;line-height:1.8;color:var(--text);
      word-break:break-word;
      box-shadow:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.03);
    }
    /* ── User bubble: blue gradient, flat bottom-right ── */
    .bubble.user-b{
      background:linear-gradient(135deg,#ddeaf6 0%,#c8dff2 100%);
      border:1px solid rgba(var(--accent-rgb),.18);
      border-radius:18px 18px 4px 18px;
      color:#1a2e42;
      box-shadow:0 1px 4px rgba(var(--accent-rgb),.08),0 4px 14px rgba(var(--accent-rgb),.06);
    }

    /* HTML content inside bot bubble */
    .bubble h3{font-size:14.5px;font-weight:800;margin:0 0 8px;letter-spacing:-.01em}
    .bubble h4{font-size:13.5px;font-weight:700;margin:9px 0 4px}
    .bubble p {margin:4px 0;color:var(--text2);font-size:14px}
    .bubble ul,.bubble ol{padding-left:18px;margin:6px 0}
    .bubble li{margin:3px 0;font-size:13.5px;color:var(--text2)}
    .bubble strong{font-weight:700;color:var(--text)}
    .bubble br+br{display:none}

    /* Timestamp */
    .msg-time{font-size:10.5px;color:var(--text3);font-family:var(--mono)}

    /* Streaming cursor */
    .cursor{
      display:inline-block;width:2px;height:14px;
      background:var(--accent);margin-left:2px;
      vertical-align:middle;border-radius:1px;
      animation:blink .85s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* Typing indicator */
    .typing-row{display:flex;gap:10px;align-items:flex-start;animation:msgIn .22s ease both}
    .typing-bubble{
      padding:14px 18px;background:var(--surface);
      border:1px solid var(--border2);
      border-radius:18px 18px 18px 4px;
      display:flex;align-items:center;gap:5px;
      box-shadow:var(--shadow);
    }
    .tdot{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.3s ease infinite}
    .tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}

    /* ══ INPUT ══ */
    .input-area{
      background:var(--bg);border-top:1px solid var(--border);
      padding:10px 14px;
      padding-bottom:calc(10px + var(--safe-bottom));
      flex-shrink:0;
    }
    .input-box{
      background:var(--surface);border:1.5px solid var(--border2);
      border-radius:14px;padding:4px 4px 4px 16px;
      display:flex;align-items:flex-end;gap:8px;
      transition:border-color .2s,box-shadow .2s;
      box-shadow:var(--shadow);
    }
    .input-box:focus-within{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(var(--accent-rgb),.10);
    }
    #txt{
      flex:1;border:none;background:transparent;outline:none;
      font-family:var(--font);font-size:15px;color:var(--text);
      resize:none;max-height:140px;line-height:1.55;
      padding:10px 0;min-height:44px;-webkit-appearance:none;
    }
    #txt::placeholder{color:var(--text3)}
    #snd{
      width:40px;height:40px;background:var(--accent);border:none;
      border-radius:11px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-bottom:4px;
      transition:all .15s;-webkit-tap-highlight-color:transparent;
    }
    #snd:hover:not(:disabled){filter:brightness(1.12)}
    #snd:active:not(:disabled){transform:scale(0.93)}
    #snd:disabled{opacity:.35;cursor:not-allowed}
    #snd svg{width:17px;height:17px}
    .hint{
      font-size:10.5px;color:var(--text3);
      text-align:center;margin-top:7px;font-family:var(--mono);
    }
    .hint a{color:var(--accent);text-decoration:none}

    /* ══ LOADING / ERROR ══ */
    #loading{
      display:flex;align-items:center;justify-content:center;
      height:100dvh;flex-direction:column;gap:14px;background:var(--bg);
    }
    .spin{
      width:32px;height:32px;
      border:2.5px solid var(--border2);border-top-color:var(--accent);
      border-radius:50%;animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin-lbl{font-family:var(--mono);font-size:11.5px;color:var(--text3)}
    #err{
      display:none;align-items:center;justify-content:center;
      height:100dvh;flex-direction:column;gap:14px;
      text-align:center;padding:32px;background:var(--bg);
    }
    .err-icon{
      width:64px;height:64px;border-radius:18px;
      background:#fdf0ee;border:1px solid rgba(192,57,43,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;margin-bottom:4px;
    }
    #err h2{font-size:20px;font-weight:800;letter-spacing:-.02em}
    #err p{font-size:13.5px;color:var(--text2);max-width:280px;line-height:1.65}

    /* ══ RESPONSIVE ══ */
    @media(max-width:480px){
      .topics-grid{grid-template-columns:1fr 1fr}
      .topic-btn{font-size:11.5px;padding:9px 10px}
      .t-icon{width:24px;height:24px;font-size:11px}
      .msgs-inner{padding:14px 13px 8px;gap:14px}
      .bubble{font-size:13.5px;padding:11px 14px}
      .msg-body{max-width:85%}
      .welcome{padding:18px 13px 12px;gap:12px}
      .welcome-card{padding:16px;gap:13px}
      .w-logo{width:46px;height:46px;border-radius:12px}
      .w-name{font-size:15px}
      .hdr-by{display:none}
      #txt{font-size:16px}
    }
    @media(max-height:500px) and (orientation:landscape){
      .hdr{height:44px}
      .msgs-inner{padding:10px 13px 6px}
      .input-area{padding:7px 12px}
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="spin-lbl">Loading agent…</div>
</div>

<div id="err">
  <div class="err-icon">🤖</div>
  <h2>Agent not found</h2>
  <p>This agent may have been removed or the link is invalid.</p>
</div>

<div id="ui" style="display:none;flex-direction:column;height:100dvh">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo" id="hLogo"><span class="hdr-fb" id="hFb">A</span></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hName">Loading…</div>
      <div class="hdr-status"><div class="status-dot"></div><span>Online · Ready to help</span></div>
    </div>
    <div class="hdr-by">by <a href="https://aasaitech.in" target="_blank">Aasai</a></div>
  </div>

  <!-- Messages scroll -->
  <div class="msgs-scroll" id="scroll">

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-card">
        <div class="w-logo" id="wLogo"><span class="w-logo-fb" id="wFb">A</span></div>
        <div>
          <div class="w-name" id="wName">Hi there! 👋</div>
          <div class="w-sub" id="wSub">How can I help you today?</div>
        </div>
      </div>
      <div class="topics-card" id="topicsCard" style="display:none">
        <div class="topics-lbl">Explore Topics</div>
        <div class="topics-loading" id="topicsLoad">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <span>Analysing knowledge base…</span>
        </div>
        <div class="topics-grid" id="topicsGrid" style="display:none"></div>
      </div>
    </div>

    <!-- Live messages -->
    <div class="msgs-inner" id="msgs"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="txt" placeholder="Ask anything…" rows="1"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button id="snd" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">
      Powered by <a href="https://aasaitech.in" target="_blank">Aasai AI</a> · Responses may not always be accurate
    </div>
  </div>
</div>

<script>
/* ═══ CONFIG ═══════════════════════════════════════════ */
const API     = 'https://fypouhme3gqldqk6sk75b75udy0ltonb.lambda-url.ap-southeast-2.on.aws'
const agentId = new URLSearchParams(location.search).get('agent')

let vid = localStorage.getItem('aasai_vid')
if (!vid) { vid = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('aasai_vid', vid) }
const sid = 's_' + Math.random().toString(36).slice(2) + Date.now().toString(36)

let cfg  = null
let busy = false
let hist = []   // [{role,content}] kept to last 20

/* ═══ TOPIC ICONS ════════════════════════════════════════ */
const ICONS = {
  fee:'💰',fees:'💰',price:'💰',cost:'💰',payment:'💰',charges:'💰',
  admission:'📋',admissions:'📋',enroll:'📋',registration:'📋',apply:'📋',
  timing:'⏰',timings:'⏰',time:'⏰',hours:'⏰',schedule:'⏰',
  transport:'🚌',bus:'🚌',route:'🚌',
  facility:'🏫',facilities:'🏫',lab:'🔬',library:'📖',
  contact:'📞',phone:'📞',email:'📧',address:'📍',location:'📍',
  class:'📚',classes:'📚',course:'📚',subject:'📚',curriculum:'📚',
  result:'🏆',results:'🏆',achievement:'🏆',rank:'🏆',
  staff:'👩‍🏫',teacher:'👩‍🏫',faculty:'👩‍🏫',principal:'👩‍🏫',
  sport:'⚽',sports:'⚽',activity:'🎨',club:'🎭',
  hostel:'🏠',accommodation:'🏠',scholarship:'🎓',
  exam:'📝',test:'📝',about:'ℹ️',overview:'ℹ️',
  health:'🏥',medical:'🏥',food:'🍽️',cafeteria:'🍽️',
  online:'💻',digital:'💻',app:'📱',website:'🌐',
  event:'🎉',fest:'🎉',security:'🔒',branch:'📍',branches:'📍',
}
function icon(t) {
  const l = t.toLowerCase()
  for (const [k,v] of Object.entries(ICONS)) if (l.includes(k)) return v
  return '💡'
}

/* ═══ LOGO HELPERS ════════════════════════════════════════ */
function injectImg(wrap, src, fb) {
  if (!src) return
  const img = document.createElement('img')
  img.src = src
  img.onerror = () => { try { wrap.removeChild(img) } catch {} }
  wrap.insertBefore(img, fb)
}

function botAvHtml() {
  const src = cfg?.logo_base64 || cfg?.logo_url || null
  if (src) return `<img src="${src}" style="width:100%;height:100%;object-fit:contain;border-radius:50%" onerror="this.style.display='none'"/>`
  return `<span style="font-size:12px;color:white;font-weight:800">${(cfg?.name||'A').charAt(0).toUpperCase()}</span>`
}

/* ═══ HEX → RGB ══════════════════════════════════════════ */
function hrgb(hex) {
  try { return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',') }
  catch { return '44,95,138' }
}

/* ═══ INIT ════════════════════════════════════════════════ */
async function init() {
  if (!agentId) { showErr(); return }
  try {
    const r = await fetch(`${API}/chat/${agentId}/config`)
    if (!r.ok) { showErr(); return }
    cfg = await r.json()
    brand()
    document.getElementById('loading').style.display = 'none'
    const ui = document.getElementById('ui')
    ui.style.display = 'flex'; ui.style.flexDirection = 'column'
    document.getElementById('topicsCard').style.display = 'block'
    loadTopics()
  } catch(e) { console.error(e); showErr() }
}

function brand() {
  const hex = (cfg.brand_color || '#2c5f8a').trim()
  const rgb = hrgb(hex)
  const rs  = document.documentElement.style
  rs.setProperty('--accent',     hex)
  rs.setProperty('--accent-rgb', rgb)
  rs.setProperty('--accent-l',   hex + '18')
  rs.setProperty('--accent-b',   hex + '44')

  document.title = cfg.name || 'Chat'
  $('hName').textContent = cfg.name || 'Assistant'
  $('wName').textContent = 'Hi there! 👋'
  $('wSub').textContent  = cfg.welcome_message || 'How can I help you today?'

  const src  = cfg.logo_base64 || cfg.logo_url || null
  const init = (cfg.name || 'A').charAt(0).toUpperCase()

  const hL = $('hLogo'), hF = $('hFb')
  hL.style.background = hex; hF.textContent = init; hF.style.color = 'white'
  injectImg(hL, src, hF)

  const wL = $('wLogo'), wF = $('wFb')
  wL.style.background = hex; wF.textContent = init; wF.style.color = 'white'
  injectImg(wL, src, wF)

  $('snd').style.background = hex

  let meta = document.querySelector('meta[name="theme-color"]')
  if (!meta) { meta = document.createElement('meta'); meta.name = 'theme-color'; document.head.appendChild(meta) }
  meta.content = hex
}

/* ═══ TOPICS ══════════════════════════════════════════════ */
async function loadTopics() {
  try {
    const r = await fetch(`${API}/chat/${agentId}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        question:'List the main topics you cover as a simple comma-separated list. Only topic names, no descriptions, no numbering, max 8 topics.',
        history:[], _internal:true
      })
    })
    const d = await r.json()
    const raw = (d.answer||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()
    let topics = raw.split(/[,\n•\-\*\|]/)
      .map(t=>t.replace(/^\d+\.\s*/,'').trim())
      .filter(t=>t.length>2&&t.length<45).slice(0,8)
    if (!topics.length) topics = (cfg.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean)
    showTopics(topics)
  } catch {
    showTopics((cfg.suggestions||[]).map(s=>s.replace(/[?]/g,'').trim()).filter(Boolean))
  }
}

function showTopics(topics) {
  const grid = $('topicsGrid'), load = $('topicsLoad')
  if (!topics.length) { $('topicsCard').style.display='none'; return }
  grid.innerHTML = topics.map(t=>`
    <button class="topic-btn" onclick="askTopic('${esc(t).replace(/'/g,"\\'")}')">
      <div class="t-icon">${icon(t)}</div>
      <span style="flex:1;line-height:1.35">${esc(t)}</span>
    </button>`).join('')
  load.style.display = 'none'; grid.style.display = 'grid'
}

function askTopic(t) { $('txt').value = 'Tell me about ' + t; resize($('txt')); send() }

/* ═══ INPUT HELPERS ═══════════════════════════════════════ */
function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey && window.innerWidth>600) { e.preventDefault(); send() }
}
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px' }

/* ═══ SEND — SSE STREAMING ════════════════════════════════ */
async function send() {
  const input = $('txt')
  const text  = input.value.trim()
  if (!text || busy) return

  // Fade out welcome
  const w = $('welcome')
  if (w) { w.style.transition='opacity .2s'; w.style.opacity='0'; setTimeout(()=>{ try{w.remove()}catch{} },200) }

  addUser(text)
  input.value = ''; input.style.height = 'auto'
  if (window.innerWidth<=600) input.blur()

  busy=true; $('snd').disabled=true

  const typingEl  = addTyping()
  let botBubble   = null
  let streamed    = ''
  let firstChunk  = true

  try {
    const resp = await fetch(`${API}/chat/${agentId}/stream`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question:text, history:hist, session_id:sid, visitor_id:vid })
    })
    if (!resp.ok) throw new Error('HTTP ' + resp.status)

    const reader  = resp.body.getReader()
    const decoder = new TextDecoder()
    let sseBuf    = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      sseBuf += decoder.decode(value, { stream:true })
      const lines = sseBuf.split('\n')
      sseBuf = lines.pop()

      for (const line of lines) {
        if (!line.startsWith('data:')) continue
        const raw = line.slice(5).trim()
        if (!raw) continue
        let evt; try { evt=JSON.parse(raw) } catch { continue }

        if (evt.type==='chunk') {
          if (firstChunk) { typingEl.remove(); botBubble=makeBotBubble(); firstChunk=false }
          streamed += evt.html
          botBubble.innerHTML = streamed + '<span class="cursor"></span>'
          scrollBottom()

        } else if (evt.type==='done') {
          if (botBubble) botBubble.innerHTML = streamed
          hist.push({role:'user',      content:text})
          hist.push({role:'assistant', content:streamed})
          if (hist.length>20) hist = hist.slice(-20)
          scrollBottom()

        } else if (evt.type==='error') {
          if (firstChunk) typingEl.remove()
          const m = `<p style="color:var(--red)">${evt.message||'Something went wrong.'}</p>`
          if (botBubble) botBubble.innerHTML=m; else addBot(m)
        }
      }
    }
    if (firstChunk) { typingEl.remove(); addBot('<p>Sorry, I could not find an answer to that.</p>') }

  } catch(e) {
    console.error(e)
    if (firstChunk) typingEl.remove()
    const m="<p>Sorry, having trouble connecting right now. Please try again.</p>"
    if (botBubble) botBubble.innerHTML=m; else addBot(m)
  }

  busy=false; $('snd').disabled=false
}

/* ═══ MESSAGE BUILDERS ════════════════════════════════════ */
function addUser(text) {
  const el = document.createElement('div')
  el.className = 'msg user'
  el.innerHTML = `
    <div class="av user">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" style="width:14px;height:14px">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="msg-body">
      <div class="msg-name">You</div>
      <div class="bubble user-b">${esc(text).replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function addBot(html) {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-name">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble">${html}</div>
      <div class="msg-time">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
}

function makeBotBubble() {
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="msg-body">
      <div class="msg-name">${esc(cfg?.name||'Assistant')} <span class="msg-badge">AI</span></div>
      <div class="bubble" id="sb"></div>
      <div class="msg-time">${ts()}</div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el.querySelector('.bubble')
}

function addTyping() {
  const el = document.createElement('div')
  el.className = 'typing-row'
  el.innerHTML = `
    <div class="av bot">${botAvHtml()}</div>
    <div class="typing-bubble">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>`
  $('msgs').appendChild(el); scrollBottom()
  return el
}

/* ═══ UTILS ═══════════════════════════════════════════════ */
function $(id) { return document.getElementById(id) }
function scrollBottom() {
  const s = $('scroll')
  requestAnimationFrame(() => { s.scrollTop = s.scrollHeight })
}
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }
function showErr() {
  $('loading').style.display = 'none'
  $('err').style.display     = 'flex'
}

// Fix mobile viewport height jumps
const setVh = () => document.documentElement.style.setProperty('--dvh',window.innerHeight*.01+'px')
setVh(); window.addEventListener('resize',setVh,{passive:true})

init()
</script>
