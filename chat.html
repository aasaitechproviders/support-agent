<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #6c63ff;
      --accent-light: #f0effe;
      --bg: #f4f4fa;
      --surface: #ffffff;
      --border: #e4e4f0;
      --text: #1a1a2e;
      --muted: #8888aa;
      --radius: 18px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── HEADER ── */
    .chat-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:12px 18px; display:flex; align-items:center; gap:12px;
      flex-shrink:0; box-shadow:0 1px 8px rgba(0,0,0,0.05);
    }
    .header-avatar { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; overflow:hidden; }
    .header-avatar img { width:100%; height:100%; object-fit:cover; }
    .header-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
    .header-status { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); margin-top:1px; }
    .status-dot { width:6px; height:6px; background:#43e97b; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .powered-by { margin-left:auto; font-size:11px; color:var(--muted); }
    .powered-by a { color:var(--accent); text-decoration:none; font-weight:500; }

    /* ── MESSAGES AREA ── */
    .messages { flex:1; overflow-y:auto; padding:0 0 12px; display:flex; flex-direction:column; }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ── BANNER ── */
    .banner {
      position:relative; overflow:hidden; flex-shrink:0;
      background:linear-gradient(135deg, var(--accent) 0%, #a855f7 50%, #ec4899 100%);
      padding:28px 24px 60px; color:white;
    }
    .banner-bg {
      position:absolute; inset:0; opacity:0.1;
      background-image: radial-gradient(circle at 20% 50%, white 1px, transparent 1px),
                        radial-gradient(circle at 80% 20%, white 1px, transparent 1px),
                        radial-gradient(circle at 60% 80%, white 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .banner-content { position:relative; z-index:1; display:flex; align-items:center; gap:16px; }
    .banner-avatar { width:56px; height:56px; border-radius:16px; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; overflow:hidden; border:2px solid rgba(255,255,255,0.3); }
    .banner-avatar img { width:100%; height:100%; object-fit:cover; border-radius:14px; }
    .banner-text h1 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
    .banner-text p { font-size:13px; opacity:0.85; margin-top:3px; line-height:1.45; }
    .banner-wave {
      position:absolute; bottom:-1px; left:0; right:0;
    }

    /* ── TOPICS SECTION ── */
    .topics-section {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:16px 16px 14px; flex-shrink:0;
      transform:translateY(-2px);
    }
    .topics-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
    .topics-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .topic-btn {
      display:flex; align-items:center; gap:7px;
      padding:8px 14px; border-radius:24px;
      border:1.5px solid var(--border); background:var(--bg);
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
      cursor:pointer; transition:all 0.18s; color:var(--text);
    }
    .topic-btn:hover { border-color:var(--accent); background:var(--accent-light); color:var(--accent); transform:translateY(-1px); }
    .topic-btn .topic-icon { font-size:15px; }
    .topics-loading { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; }
    .dots { display:flex; gap:4px; }
    .dot { width:5px; height:5px; background:var(--muted); border-radius:50%; animation:typing 1.2s infinite; }
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ── MESSAGES INNER ── */
    .msgs-inner { padding:16px 16px 0; display:flex; flex-direction:column; gap:14px; }

    /* ── MESSAGE BUBBLES ── */
    .message { display:flex; gap:8px; animation:msgIn 0.25s ease; max-width:88%; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .message.user { align-self:flex-end; flex-direction:row-reverse; }
    .message.bot { align-self:flex-start; }
    .msg-avatar { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px; overflow:hidden; }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-body { display:flex; flex-direction:column; gap:3px; }
    .msg-bubble { padding:12px 16px; border-radius:var(--radius); font-size:14px; line-height:1.6; }
    .message.user .msg-bubble { background:var(--accent); color:white; border-bottom-right-radius:5px; }
    .message.bot .msg-bubble { background:var(--surface); color:var(--text); border:1px solid var(--border); border-bottom-left-radius:5px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .msg-time { font-size:10px; color:var(--muted); }
    .message.user .msg-time { text-align:right; }

    /* HTML content inside bot bubble */
    .msg-bubble h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin:0 0 8px; }
    .msg-bubble h4 { font-size:14px; font-weight:600; margin:8px 0 4px; }
    .msg-bubble p { margin:4px 0; }
    .msg-bubble ul { padding-left:18px; margin:6px 0; }
    .msg-bubble li { margin:3px 0; font-size:13px; }
    .msg-bubble strong { font-weight:600; }
    .msg-bubble div + div { margin-top:4px; }

    /* ── TYPING ── */
    .typing-wrap { display:flex; gap:8px; align-self:flex-start; animation:msgIn 0.2s ease; }
    .typing-bubble { padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:5px; display:flex; align-items:center; gap:5px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .typing-dot { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:typing 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}

    /* ── INPUT ── */
    .chat-input-area { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px 16px; flex-shrink:0; }
    .input-row { display:flex; align-items:flex-end; gap:10px; background:var(--bg); border:1.5px solid var(--border); border-radius:16px; padding:8px 8px 8px 16px; transition:border-color 0.2s; }
    .input-row:focus-within { border-color:var(--accent); background:white; }
    #msg-input { flex:1; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none; resize:none; max-height:120px; line-height:1.55; padding:4px 0; }
    #msg-input::placeholder { color:var(--muted); }
    .btn-send { width:38px; height:38px; background:var(--accent); border:none; border-radius:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .btn-send:hover:not(:disabled) { background:#5a52e0; transform:scale(1.05); }
    .btn-send:disabled { background:#c8c4f0; cursor:not-allowed; }
    .input-hint { font-size:11px; color:var(--muted); text-align:center; margin-top:8px; }

    /* ── LOADING / ERROR ── */
    #loading { display:flex; align-items:center; justify-content:center; height:100dvh; flex-direction:column; gap:12px; color:var(--muted); font-size:14px; }
    .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #error-screen { display:none; align-items:center; justify-content:center; height:100dvh; flex-direction:column; gap:12px; text-align:center; padding:20px; }
    #error-screen h2 { font-family:'Syne',sans-serif; }
    #error-screen p { color:var(--muted); font-size:14px; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Loading...</span></div>

<div id="error-screen">
  <div style="font-size:48px;">🤖</div>
  <h2>Agent not found</h2>
  <p>This agent may have been removed or the link is invalid.</p>
</div>

<div id="chat-ui" style="display:none; flex-direction:column; height:100dvh;">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar" id="h-avatar">🤖</div>
    <div>
      <div class="header-name" id="h-name">Loading...</div>
      <div class="header-status"><div class="status-dot"></div>Online</div>
    </div>
    <div class="powered-by">by <a href="https://aasaitech.in" target="_blank">Aasai</a></div>
  </div>

  <!-- SCROLLABLE AREA -->
  <div class="messages" id="messages">

    <!-- BANNER -->
    <div class="banner" id="banner">
      <div class="banner-bg"></div>
      <div class="banner-content">
        <div class="banner-avatar" id="b-avatar">🤖</div>
        <div class="banner-text">
          <h1 id="b-name">Hi there! 👋</h1>
          <p id="b-msg">I'm your AI assistant. Ask me anything!</p>
        </div>
      </div>
      <svg class="banner-wave" viewBox="0 0 1440 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 40L60 34C120 28 240 16 360 13C480 10 600 16 720 20C840 24 960 26 1080 22C1200 18 1320 8 1380 3L1440 0V40H1380C1320 40 1200 40 1080 40C960 40 840 40 720 40C600 40 480 40 360 40C240 40 120 40 60 40H0Z" fill="#f4f4fa"/>
      </svg>
    </div>

    <!-- TOPICS -->
    <div class="topics-section" id="topics-section">
      <div class="topics-label">Explore Topics</div>
      <div class="topics-loading" id="topics-loading">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>Analysing knowledge base...</span>
      </div>
      <div class="topics-grid" id="topics-grid" style="display:none;"></div>
    </div>

    <!-- MESSAGES INNER -->
    <div class="msgs-inner" id="msgs-inner"></div>

  </div>

  <!-- INPUT -->
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Type your message..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="send()">
        <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Powered by Aasai AI · Responses may not always be accurate</div>
  </div>

</div>

<script>
  const API = 'https://apiv2.aasaitech.in'
  const agentId = new URLSearchParams(window.location.search).get('agent')
  let config = null
  let busy = false
  let conversationHistory = []

  // ── INIT ──
  async function init() {
    if (!agentId) { showError(); return }
    try {
      const r = await fetch(`${API}/chat/${agentId}/config`)
      if (!r.ok) { showError(); return }
      config = await r.json()
      applyBranding()
      document.getElementById('loading').style.display = 'none'
      const ui = document.getElementById('chat-ui')
      ui.style.display = 'flex'
      ui.style.flexDirection = 'column'
      // Extract topics from knowledge
      extractTopics()
    } catch(e) { showError() }
  }

  // ── BRANDING ──
  function applyBranding() {
    const c = config.brand_color || '#6c63ff'
    document.documentElement.style.setProperty('--accent', c)
    document.title = config.name || 'Chat'

    const logo = config.logo_url
      ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />`
      : '🤖'

    // Header
    document.getElementById('h-name').textContent = config.name || 'Assistant'
    document.getElementById('h-avatar').innerHTML = logo
    document.getElementById('h-avatar').style.background = c + '22'

    // Banner
    document.getElementById('b-avatar').innerHTML = logo
    document.getElementById('b-name').textContent = 'Hi there! 👋'
    document.getElementById('b-msg').textContent = config.welcome_message || 'How can I help you today?'

    // Banner gradient uses brand color
    document.getElementById('banner').style.background =
      `linear-gradient(135deg, ${c} 0%, ${shiftColor(c)} 100%)`
  }

  // Shift color for gradient
  function shiftColor(hex) {
    try {
      const r = parseInt(hex.slice(1,3),16)
      const g = parseInt(hex.slice(3,5),16)
      const b = parseInt(hex.slice(5,7),16)
      return `rgb(${Math.min(r+40,255)}, ${Math.min(g+20,255)}, ${Math.max(b-30,0)})`
    } catch(e) { return '#a855f7' }
  }

  // ── TOPIC EXTRACTION ──
  // Topic definitions with icons and trigger questions
  const TOPIC_ICONS = {
    fees: '💰', fee: '💰', price: '💰', cost: '💰', payment: '💰',
    admission: '📋', admissions: '📋', enroll: '📋', registration: '📋',
    timing: '⏰', timings: '⏰', time: '⏰', hours: '⏰', schedule: '⏰',
    transport: '🚌', bus: '🚌', vehicle: '🚌',
    facility: '🏫', facilities: '🏫', infrastructure: '🏫', lab: '🏫',
    contact: '📞', phone: '📞', email: '📞', address: '📞',
    class: '📚', classes: '📚', course: '📚', subject: '📚', curriculum: '📚',
    result: '🏆', results: '🏆', achievement: '🏆', score: '🏆',
    staff: '👩‍🏫', teacher: '👩‍🏫', faculty: '👩‍🏫',
    sport: '⚽', sports: '⚽', game: '⚽', activity: '⚽',
    hostel: '🏠', accommodation: '🏠',
    scholarship: '🎓', discount: '🎓',
    online: '💻', digital: '💻', elearning: '💻',
    exam: '📝', test: '📝', assessment: '📝',
    faq: '❓', question: '❓',
    about: 'ℹ️', overview: 'ℹ️', introduction: 'ℹ️'
  }

  async function extractTopics() {
    try {
      // Ask AI to extract topics from the knowledge base
      const r = await fetch(`${API}/chat/${agentId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: 'LIST_TOPICS_INTERNAL',
          history: [],
          _internal: true
        })
      })

      // Use a direct Anthropic call to extract topics from config
      // Since we have the knowledge via the chat endpoint, we ask it to list topics
      const topicRes = await fetch(`${API}/chat/${agentId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: 'What are the main topics and sections covered in your knowledge base? List only the topic names as a simple comma-separated list, nothing else. Maximum 8 topics.',
          history: []
        })
      })

      const data = await topicRes.json()
      const raw = data.answer || ''

      // Strip HTML to get plain text
      const plain = raw.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim()

      // Parse topics - split by comma, newline, bullet
      let topics = plain
        .split(/[,\n•\-\*]/)
        .map(t => t.trim())
        .filter(t => t.length > 2 && t.length < 40)
        .slice(0, 8)

      if (topics.length === 0) {
        // Fallback: extract from suggestions
        topics = (config.suggestions || []).map(s => s.replace(/[?]/g, '').trim())
      }

      renderTopics(topics)
    } catch(e) {
      // Fallback to config suggestions
      const fallback = config.suggestions?.length
        ? config.suggestions.map(s => s.replace(/[?]/g,'').trim())
        : ['About Us', 'Contact', 'Services']
      renderTopics(fallback)
    }
  }

  function renderTopics(topics) {
    const grid = document.getElementById('topics-grid')
    const loading = document.getElementById('topics-loading')

    if (!topics.length) {
      document.getElementById('topics-section').style.display = 'none'
      return
    }

    grid.innerHTML = topics.map(topic => {
      const icon = getTopicIcon(topic)
      return `<button class="topic-btn" onclick="sendText('Tell me about ${topic}')">
        <span class="topic-icon">${icon}</span>
        <span>${topic}</span>
      </button>`
    }).join('')

    loading.style.display = 'none'
    grid.style.display = 'flex'
  }

  function getTopicIcon(topic) {
    const lower = topic.toLowerCase()
    for (const [key, icon] of Object.entries(TOPIC_ICONS)) {
      if (lower.includes(key)) return icon
    }
    return '💡'
  }

  // ── CHAT ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  }

  function sendText(t) {
    document.getElementById('msg-input').value = t
    send()
  }

  async function send() {
    const input = document.getElementById('msg-input')
    const text = input.value.trim()
    if (!text || busy) return

    // Hide banner and topics on first real message
    document.getElementById('banner').style.display = 'none'
    document.getElementById('topics-section').style.display = 'none'

    addMsg('user', text)
    input.value = ''; input.style.height = 'auto'
    busy = true
    document.getElementById('send-btn').disabled = true

    const typing = showTyping()

    try {
      const r = await fetch(`${API}/chat/${agentId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text, history: conversationHistory })
      })
      const d = await r.json()
      typing.remove()

      const answer = d.answer || '<p>Sorry, I could not find an answer to that.</p>'
      addMsg('bot', answer)

      conversationHistory.push({ role: 'user', content: text })
      conversationHistory.push({ role: 'assistant', content: answer })
      if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20)

    } catch(e) {
      typing.remove()
      addMsg('bot', '<p>Sorry, I\'m having trouble connecting. Please try again.</p>')
    }

    busy = false
    document.getElementById('send-btn').disabled = false
    document.getElementById('msg-input').focus()
  }

  function addMsg(role, content) {
    const container = document.getElementById('msgs-inner')
    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
    const c = config?.brand_color || '#6c63ff'
    const logo = config?.logo_url
      ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />`
      : '🤖'

    const el = document.createElement('div')
    el.className = `message ${role}`

    if (role === 'user') {
      el.innerHTML = `
        <div class="msg-avatar" style="background:${c}22">${logo}</div>
        <div class="msg-body">
          <div class="msg-bubble">${escapeUser(content)}</div>
          <div class="msg-time">${time}</div>
        </div>`
    } else {
      el.innerHTML = `
        <div class="msg-avatar" style="background:${c}22">${logo}</div>
        <div class="msg-body">
          <div class="msg-bubble">${content}</div>
          <div class="msg-time">${time}</div>
        </div>`
    }

    container.appendChild(el)
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
  }

  function showTyping() {
    const container = document.getElementById('msgs-inner')
    const c = config?.brand_color || '#6c63ff'
    const logo = config?.logo_url
      ? `<img src="${config.logo_url}" onerror="this.parentElement.textContent='🤖'" />`
      : '🤖'
    const el = document.createElement('div')
    el.className = 'typing-wrap'
    el.innerHTML = `
      <div class="msg-avatar" style="background:${c}22">${logo}</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`
    container.appendChild(el)
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
    return el
  }

  function escapeUser(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
  }

  function showError() {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error-screen').style.display = 'flex'
  }

  init()
</script>
</body>
</html>
